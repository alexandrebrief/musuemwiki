<style>
#loader-spin {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s;
}

#loader-spin.visible {
    opacity: 1;
    visibility: visible;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(108, 92, 231, 0.1);
    border-top: 4px solid var(--accent, #6c5ce7);
    border-right: 4px solid #a8a4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<div id="loader-spin">
    <div class="spinner"></div>
</div>

<script>
(function() {
    const loader = document.getElementById('loader-spin');

    window.showLoader = function() {
        loader?.classList.add('visible');
    };

    window.hideLoader = function() {
        loader?.classList.remove('visible');
    };

    // --- CAS 1 : Les clics sur les liens (<a>) ---
    document.addEventListener('click', function(e) {
        let link = e.target.closest('a');
        
        // 1. On ignore si ce n'est pas un lien
        if (!link || !link.href) return;

        // 2. SÉCURITÉ : On ignore si l'utilisateur veut ouvrir dans un nouvel onglet
        // e.ctrlKey (Windows/Linux), e.metaKey (Mac/Command), e.shiftKey, ou clic milieu (button 1)
        if (e.ctrlKey || e.metaKey || e.shiftKey || e.button === 1) {
            return; 
        }

        // 3. On ignore les cas classiques (target blank, javascript, ancres)
        if (link.target === "_blank" || link.href.startsWith('javascript:')) return;
        
        const url = link.getAttribute('href');
        if (!url || url === '#' || url.startsWith('#')) return;

        // Si on arrive ici, c'est une navigation normale sur le même onglet
        showLoader();
    });

    // --- CAS 2 : Les envois de formulaires ---
    document.addEventListener('submit', function(e) {
        if (e.target.method === 'get' || e.target.method === 'post') {
            // On vérifie aussi que le formulaire n'est pas censé s'ouvrir dans un nouvel onglet
            if (e.target.target !== "_blank") {
                showLoader();
            }
        }
    });

    // --- CAS 3 : Les redirections JavaScript ---
    window.addEventListener('beforeunload', function(e) {
        // Note : On ne peut pas savoir ici si c'est un CTRL+clic, 
        // mais le listener 'click' au-dessus s'exécute AVANT celui-ci
        showLoader();
    });

    // --- SÉCURITÉ SUPPLÉMENTAIRE ---
    // Si l'utilisateur fait "Précédent" ou si le chargement est annulé
    window.addEventListener('pageshow', function() {
        hideLoader();
    });

    // Si la page devient à nouveau visible (cas où le loader resterait bloqué)
    document.addEventListener('visibilitychange', function() {
        if (document.visibilityState === 'visible') {
            // On laisse un petit délai pour voir si la page change vraiment
            setTimeout(hideLoader, 500); 
        }
    });
})();
</script>
