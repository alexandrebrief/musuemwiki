<style>
#loader-spin {
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 10000;
    opacity: 0;
    visibility: hidden;
    transition: opacity 0.2s;
}

#loader-spin.visible {
    opacity: 1;
    visibility: visible;
}

.spinner {
    width: 60px;
    height: 60px;
    border: 4px solid rgba(108, 92, 231, 0.1);
    border-top: 4px solid var(--accent, #6c5ce7);
    border-right: 4px solid #a8a4ff;
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}
</style>

<div id="loader-spin">
    <div class="spinner"></div>
</div>

<script>
(function() {
    document.addEventListener('click', function(e) {
        let link = e.target.closest('a');
        if (link && link.href && !link.target && !link.href.startsWith('#') && !link.href.startsWith('javascript:')) {
            document.getElementById('loader-spin')?.classList.add('visible');
        }
    });
    
    window.addEventListener('load', function() {
        document.getElementById('loader-spin')?.classList.remove('visible');
    });
    
    window.showLoader = function() {
        document.getElementById('loader-spin')?.classList.add('visible');
    };
    
    window.hideLoader = function() {
        document.getElementById('loader-spin')?.classList.remove('visible');
    };
})();
</script>
