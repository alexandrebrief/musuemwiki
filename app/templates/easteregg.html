<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥚{{ site_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --font-display: 'Space Grotesk', sans-serif;
            --font-text: 'Inter', sans-serif;
            --accent: #6c5ce7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-text);
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D, #FF9F1C, #BF8FAD);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #2c3e50;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 1s ease;
        }

        @keyframes gradientShift {
            0%   { background-position: 0% 50%; }
            25%  { background-position: 50% 100%; }
            50%  { background-position: 100% 50%; }
            75%  { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }

        /* ===== FORMES GÉOMÉTRIQUES ===== */
        .shape {
            position: absolute;
            pointer-events: none;
            animation: rotate 20s infinite linear;
        }

        @keyframes rotate {
            from { transform: rotate(0deg); }
            to   { transform: rotate(360deg); }
        }

        .shape.square  { background: #2c3e50; opacity: 0.05; }
        .shape.circle  { border-radius: 50%; background: #e6d8c3; opacity: 0.1; }
        .shape.triangle {
            width: 0; height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #2c3e50;
            opacity: 0.05;
            background: transparent;
        }

        /* ===== PARTICULES ===== */
        .particle {
            position: absolute;
            border-radius: 50%;
            animation: floatUp 10s infinite linear;
            pointer-events: none;
        }

        @keyframes floatUp {
            0%   { transform: translateY(100vh); opacity: 0; }
            10%  { opacity: 0.5; }
            90%  { opacity: 0.5; }
            100% { transform: translateY(-100px) translateX(100px); opacity: 0; }
        }

        /* ===== CARTE ===== */
        .surprise-card {
            background: rgba(255, 255, 255, 0.92);
            backdrop-filter: blur(10px);
            border-radius: 16px;
            padding: 2.5rem 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 700px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.4);
        }

        @keyframes popIn {
            0%   { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }

        .surprise-card.shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }

        @keyframes shake {
            0%   { transform: translate(1px, 1px) rotate(0deg); }
            10%  { transform: translate(-1px, -2px) rotate(-1deg); }
            20%  { transform: translate(-3px, 0px) rotate(1deg); }
            30%  { transform: translate(3px, 2px) rotate(0deg); }
            40%  { transform: translate(1px, -1px) rotate(1deg); }
            50%  { transform: translate(-1px, 2px) rotate(-1deg); }
            60%  { transform: translate(-3px, 1px) rotate(0deg); }
            70%  { transform: translate(3px, 1px) rotate(-1deg); }
            80%  { transform: translate(-1px, -1px) rotate(1deg); }
            90%  { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }

        .card-title {
            font-family: var(--font-display);
            font-size: 2.5rem;
            font-weight: 600;
            color: #2c3e50;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            margin-bottom: 0.3rem;
        }

        .subtitle {
            font-size: 0.85rem;
            color: #5d6d7e;
            margin-bottom: 1.5rem;
            font-style: italic;
        }

        /* ===== CADRE CITATION ===== */
        .quote-frame {
            background: rgba(255,255,255,0.5);
            border: 1px solid rgba(44,62,80,0.15);
            border-radius: 8px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            min-height: 160px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }

        .original-quote {
            font-family: 'Playfair Display', serif;
            font-size: 1.4rem;
            font-style: italic;
            color: #2c3e50;
            line-height: 1.5;
            animation: fadeIn 0.5s;
        }

        .translation {
            font-size: 0.85rem;
            color: #5d6d7e;
            margin-top: 0.5rem;
            animation: fadeIn 0.5s 0.1s both;
        }

        .quote-author {
            font-size: 0.8rem;
            color: #8e9aab;
            margin-top: 0.5rem;
            font-style: italic;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(8px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        /* ===== BOUTONS ===== */
        .button-container {
            display: flex;
            gap: 0.8rem;
            justify-content: center;
            margin: 1.5rem 0 1rem;
            flex-wrap: wrap;
        }

        .btn-site {
            padding: 0.6rem 1.5rem;
            border-radius: 30px;
            font-family: var(--font-text);
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            text-decoration: none;
            border: none;
        }

        .btn-dark {
            background: #2c3e50;
            color: #e6d8c3;
        }

        .btn-dark:hover {
            background: #1a252f;
            color: #e6d8c3;
            transform: scale(1.02);
        }

        .btn-light {
            background: transparent;
            color: #2c3e50;
            border: 1px solid #2c3e50;
        }

        .btn-light:hover {
            background: #2c3e50;
            color: #e6d8c3;
            transform: scale(1.02);
        }

        /* ===== SECRET ===== */
        .secret-message {
            margin-top: 1rem;
            font-size: 0.7rem;
            color: #8e9aab;
            cursor: pointer;
            transition: all 0.2s;
            padding: 0.3rem 1rem;
            display: inline-block;
            border-radius: 30px;
            text-transform: uppercase;
            letter-spacing: 1px;
            border: 1px solid rgba(0,0,0,0.08);
        }

        .secret-message:hover {
            color: #2c3e50;
            border-color: rgba(0,0,0,0.2);
        }

        /* ===== CONFETTIS ===== */
        .confetti {
            position: absolute;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            border-radius: 2px;
            animation: confettiFall 3s ease-out forwards;
        }

        @keyframes confettiFall {
            0%   { transform: translateY(-20vh) rotate(0deg); opacity: 1; }
            100% { transform: translateY(120vh) rotate(720deg); opacity: 0; }
        }

        @media (max-width: 768px) {
            .surprise-card { padding: 1.5rem; }
            .card-title    { font-size: 2rem; }
            .original-quote { font-size: 1.1rem; }
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <!-- Formes géométriques -->
    <div class="shape square" style="top:10%;left:5%;width:80px;height:80px;"></div>
    <div class="shape circle" style="top:70%;right:10%;width:100px;height:100px;"></div>
    <div class="shape triangle" style="bottom:20%;left:15%;"></div>
    <div class="shape circle" style="top:30%;right:25%;width:60px;height:60px;"></div>
    <div class="shape square" style="bottom:40%;left:10%;width:40px;height:40px;"></div>
    <div class="shape triangle" style="top:80%;left:30%;"></div>

    <div id="particles-container"></div>
    <div id="confetti-container" style="position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:9999;"></div>

    <div class="main-content">
        <div class="surprise-card" id="surpriseCard">
            <div class="card-title">BRAVO !</div>
            <div class="subtitle">(mais chut, tu as trouvé l'easter egg de mon site)</div>

            <div class="quote-frame">
                <div class="original-quote" id="originalQuote"></div>
                <div class="translation" id="translation"></div>
                <div class="quote-author" id="author"></div>
            </div>

            <div class="button-container">
                <a href="/" class="btn-site btn-dark">Retour à l'accueil</a>
                <button class="btn-site btn-light" onclick="randomQuote()">
                    <i class="fas fa-random me-1"></i> Nouvelle citation
                </button>
            </div>

            <div class="secret-message" onclick="explodeConfetti()">
                Ne cliquez pas ici
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        const quotes = [
            { original: "L'art est le mensonge qui nous permet de comprendre la vérité.", translation: "", author: "Pablo Picasso", language: "fr" },
            { original: "Art washes away from the soul the dust of everyday life.", translation: "L'art lave notre âme de la poussière du quotidien.", author: "Pablo Picasso", language: "en" },
            { original: "芸術は自然の模倣ではなく、自然の理想化である。", translation: "L'art n'est pas l'imitation de la nature, mais son idéalisation.", author: "Aristote", language: "jp" },
            { original: "Искусство — это посредник того, что нельзя высказать.", translation: "L'art est l'intermédiaire de ce qu'on ne peut pas exprimer.", author: "Johann Wolfgang von Goethe", language: "ru" },
            { original: "الفن هو الكذبة التي تسمح لنا بفهم الحقيقة.", translation: "L'art est le mensonge qui nous permet de comprendre la vérité.", author: "Pablo Picasso", language: "ar" },
            { original: "艺术是生活的镜子。", translation: "L'art est le miroir de la vie.", author: "Léon Tolstoï", language: "zh" },
            { original: "Kunst ist die schönste aller Lügen.", translation: "L'art est le plus beau de tous les mensonges.", author: "Pablo Picasso", language: "de" },
            { original: "Umculo wumphefumulo womhlaba.", translation: "L'art est l'âme du monde.", author: "Proverbe zoulou", language: "zu" },
            { original: "El arte es la expresión de los más profundos pensamientos por el camino más sencillo.", translation: "L'art est l'expression des pensées les plus profondes par le chemin le plus simple.", author: "Albert Einstein", language: "es" },
            { original: "A arte é a contemplação do mundo no seu estado de graça.", translation: "L'art est la contemplation du monde dans son état de grâce.", author: "Albert Camus", language: "pt" }
        ];

        const colorPalettes = [
            ['#FF6B6B','#4ECDC4','#FFE66D','#FF9F1C','#BF8FAD'],
            ['#FF8A5C','#B83B5E','#F9ED69','#6A2C70','#08D9D6'],
            ['#FFC93C','#A2D0C1','#FF5E5E','#3B9AE1','#E98580'],
            ['#F38181','#FCE38A','#EAFFD0','#95E1D3','#A8E6CF'],
            ['#FFAAA5','#FFD3B6','#DCA47C','#9B7B6B','#698474'],
            ['#FFB8B8','#C6D7EB','#F3E0B5','#C5A880','#9F5F80'],
            ['#FFC0CB','#B5EAD7','#C7CEEA','#F9D6B7','#E2F0CB'],
            ['#FF9A8B','#FF6A88','#FF99AC','#FFB6C1','#FFC3A0']
        ];

        function randomQuote() {
            const quote = quotes[Math.floor(Math.random() * quotes.length)];
            document.getElementById('originalQuote').textContent = '\u201c' + quote.original + '\u201d';
            document.getElementById('translation').textContent = (quote.language !== 'fr' && quote.translation) ? '(' + quote.translation + ')' : '';
            document.getElementById('author').textContent = '— ' + quote.author;
        }

        function changeBackground() {
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
            document.body.style.background = `linear-gradient(135deg, ${palette.join(', ')})`;
            document.body.style.backgroundSize = '400% 400%';
        }

        function explodeConfetti() {
            const card = document.getElementById('surpriseCard');
            card.classList.add('shake');
            setTimeout(() => card.classList.remove('shake'), 500);
            setTimeout(changeBackground, 800);

            const container = document.getElementById('confetti-container');
            const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#FF9F1C','#BF8FAD','#FF8A5C','#B83B5E','#F9ED69','#6A2C70','#08D9D6'];

            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const c = document.createElement('div');
                    c.className = 'confetti';
                    const size = Math.random() * 12 + 5;
                    c.style.cssText = `
                        left: ${Math.random() * 100}%;
                        top: -10%;
                        width: ${size}px;
                        height: ${size}px;
                        background: ${colors[Math.floor(Math.random() * colors.length)]};
                        animation: confettiFall ${Math.random() * 2 + 2}s ease-out forwards;
                        animation-delay: ${Math.random() * 0.3}s;
                        transform: rotate(${Math.random() * 360}deg);
                    `;
                    container.appendChild(c);
                    setTimeout(() => c.remove(), 5000);
                }, i * 5);
            }
        }

        function createBackgroundParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 50; i++) {
                const p = document.createElement('div');
                p.className = 'particle';
                const size = Math.random() * 6 + 2;
                p.style.cssText = `
                    left: ${Math.random() * 100}%;
                    top: ${Math.random() * 100}%;
                    width: ${size}px;
                    height: ${size}px;
                    background: hsl(${Math.random() * 360}, 70%, 70%);
                    animation-duration: ${Math.random() * 10 + 5}s;
                    animation-delay: ${Math.random() * 5}s;
                    opacity: 0.3;
                `;
                container.appendChild(p);
            }
        }

        document.addEventListener('DOMContentLoaded', function() {
            randomQuote();
            createBackgroundParticles();
        });
    </script>
</body>
</html>
