<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <title>Musées - {{ site_name }}</title>
    
    <!-- Fonts -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700;800;900&family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
    
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary: #2c3e50;
            --primary-dark: #1a2634;
            --secondary: #e6d8c3;
            --background: #0f1a24;
            --surface: #1e2a36;
            --surface-light: #2a3a48;
            --text: #e6d8c3;
            --text-light: #b8a99a;
            --gold: #d4af37;
            --gold-light: rgba(212,175,55,0.15);
            --border: rgba(230,216,195,0.15);
            --shadow: 0 4px 12px rgba(0,0,0,0.3);
            --shadow-hover: 0 8px 20px rgba(0,0,0,0.5);
            --radius: 16px;
            --radius-sm: 10px;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--background);
            font-family: 'Inter', sans-serif;
            color: var(--text);
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 700;
            color: white;
            letter-spacing: -0.02em;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
            padding: 0 2rem;
        }

        /* ===== HEADER ===== */
        .page-header {
            padding: 2rem 0 1rem;
            border-bottom: 1px solid var(--border);
            margin-bottom: 2rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .page-title {
            font-size: 2.5rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .page-title i {
            color: var(--gold);
            font-size: 2rem;
        }

        .global-stats {
            background: var(--surface);
            padding: 0.6rem 1.5rem;
            border-radius: 40px;
            border: 1px solid var(--border);
            display: flex;
            gap: 1.5rem;
        }

        .global-stats span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            color: var(--text-light);
        }

        .global-stats i {
            color: var(--gold);
        }

        /* ===== RECHERCHE ===== */
        .search-section {
            margin-bottom: 2.5rem;
        }

        .search-wrapper {
            max-width: 500px;
            margin: 0 auto;
        }

        .search-card {
            background: var(--surface);
            border-radius: 50px;
            padding: 0.3rem 0.3rem 0.3rem 1.5rem;
            border: 1px solid var(--border);
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
        }

        .search-icon {
            color: var(--text-light);
            margin-right: 0.5rem;
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 0.8rem 0;
            background: transparent;
            color: white;
            font-size: 1rem;
        }

        .search-input::placeholder {
            color: var(--text-light);
        }

        .search-input:focus {
            outline: none;
        }

        .search-reset {
            background: var(--primary-dark);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.4rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            transition: all 0.2s;
        }

        .search-reset:hover {
            background: var(--gold);
            color: var(--primary-dark);
            border-color: var(--gold);
        }

        /* ===== LISTE PAYS ===== */
        .countries-panel {
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            overflow: hidden;
            margin-bottom: 2rem;
            display: none;
        }

        .countries-panel.visible {
            display: block;
        }

        .countries-header {
            padding: 1rem 1.5rem;
            background: var(--primary-dark);
            border-bottom: 1px solid var(--border);
            font-weight: 600;
            color: var(--gold);
        }

        .countries-list {
            max-height: 400px;
            overflow-y: auto;
        }

        .country-item {
            padding: 1rem 1.5rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
        }

        .country-item:hover {
            background: var(--primary-dark);
        }

        .country-name {
            font-weight: 500;
            color: white;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .country-name i {
            color: var(--gold);
            width: 20px;
        }

        .country-stats {
            display: flex;
            gap: 1.5rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .country-stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .country-stats i {
            color: var(--gold);
        }

        /* ===== FILTRES ACTIFS ===== */
        .active-filters {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .filter-badge {
            background: var(--gold-light);
            border: 1px solid rgba(212,175,55,0.3);
            color: var(--gold);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .filter-badge i {
            cursor: pointer;
        }

        .filter-badge i:hover {
            color: var(--accent, #c44545);
        }

        .clear-filters {
            background: none;
            border: none;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.9rem;
            text-decoration: underline;
        }

        .clear-filters:hover {
            color: var(--gold);
        }

        /* ===== VILLES ===== */
        .cities-section {
            margin-bottom: 2.5rem;
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .section-header h3 {
            font-size: 1.4rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .section-header h3 i {
            color: var(--gold);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(220px, 1fr));
            gap: 1rem;
        }

        .city-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .city-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            box-shadow: var(--shadow-hover);
            background: var(--surface-light);
        }

        .city-card.active {
            background: var(--gold);
            border-color: var(--gold);
        }

        .city-card.active .city-name,
        .city-card.active .city-stats {
            color: var(--primary-dark);
        }

        .city-name {
            font-weight: 600;
            font-size: 1.1rem;
            margin-bottom: 0.8rem;
            color: white;
        }

        .city-stats {
            display: flex;
            gap: 1rem;
            color: var(--text-light);
            font-size: 0.9rem;
        }

        .city-stats span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .city-stats i {
            color: var(--gold);
        }

        .city-card.active .city-stats i {
            color: var(--primary-dark);
        }

        /* ===== MUSÉES ===== */
        .museums-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
            flex-wrap: wrap;
            gap: 1rem;
        }

        .museums-header h3 {
            font-size: 1.4rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .museums-header h3 i {
            color: var(--gold);
        }

        .museums-count {
            background: var(--gold-light);
            color: var(--gold);
            padding: 0.3rem 1.2rem;
            border-radius: 30px;
            font-size: 0.9rem;
            border: 1px solid rgba(212,175,55,0.3);
        }

        .museums-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 1.2rem;
            margin-bottom: 2rem;
        }

        .museum-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius-sm);
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            flex-direction: column;
            gap: 0.5rem;
            text-decoration: none;
            color: inherit;
        }

        .museum-card:hover {
            transform: translateY(-3px);
            border-color: var(--gold);
            box-shadow: var(--shadow-hover);
            background: var(--surface-light);
        }

        .museum-icon {
            width: 40px;
            height: 40px;
            background: var(--gold-light);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--gold);
            margin-bottom: 0.5rem;
        }

        .museum-name {
            font-weight: 600;
            font-size: 1rem;
            color: white;
            line-height: 1.3;
        }

        .museum-location {
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .museum-location i {
            color: var(--gold);
            font-size: 0.7rem;
        }

        .museum-works {
            font-size: 0.85rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.3rem;
        }

        .museum-works i {
            color: var(--gold);
            font-size: 0.7rem;
        }

        /* ===== BOUTON VOIR PLUS ===== */
        .view-more-container {
            text-align: center;
            margin: 2rem 0;
        }

        .btn-view-more {
            background: transparent;
            border: 2px solid var(--gold);
            border-radius: 40px;
            padding: 0.8rem 2.5rem;
            color: var(--gold);
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s;
            font-size: 0.95rem;
        }

        .btn-view-more:hover {
            background: var(--gold);
            color: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212,175,55,0.3);
        }

        /* ===== VUE DÉTAIL MUSÉE ===== */
        .museum-detail-view {
            display: none;
            margin-bottom: 2rem;
        }

        .museum-detail-header {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 2rem;
            border: 1px solid var(--border);
            margin-bottom: 2rem;
            position: relative;
        }

        .back-button {
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            background: var(--primary-dark);
            border: 1px solid var(--border);
            color: var(--text-light);
            padding: 0.5rem 1.2rem;
            border-radius: 30px;
            cursor: pointer;
            margin-bottom: 1.5rem;
            transition: all 0.2s;
        }

        .back-button:hover {
            background: var(--gold);
            color: var(--primary-dark);
            border-color: var(--gold);
        }

        .museum-detail-title {
            font-size: 2.2rem;
            color: white;
            margin-bottom: 1rem;
        }

        .museum-detail-meta {
            display: flex;
            gap: 2rem;
            color: var(--text-light);
            margin-bottom: 2rem;
            flex-wrap: wrap;
        }

        .museum-detail-meta span {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .museum-detail-meta i {
            color: var(--gold);
        }

        .museum-works-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 1rem;
            margin-top: 2rem;
        }

        .museum-work-item {
            aspect-ratio: 2/3;
            border-radius: var(--radius-sm);
            overflow: hidden;
            box-shadow: var(--shadow);
            transition: all 0.2s;
            cursor: pointer;
        }

        .museum-work-item:hover {
            transform: translateY(-3px);
            box-shadow: var(--shadow-hover);
            border: 1px solid var(--gold);
        }

        .museum-work-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        /* ===== LOADING & EMPTY STATES ===== */
        .loading, .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
            grid-column: span 4;
        }

        .loading i {
            margin-right: 0.5rem;
            color: var(--gold);
        }

        /* ===== SCROLL TO TOP ===== */
        .scroll-top {
            position: fixed;
            bottom: 2rem;
            right: 2rem;
            background: var(--gold);
            color: var(--primary-dark);
            width: 45px;
            height: 45px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            opacity: 0;
            visibility: hidden;
            transition: all 0.2s;
            box-shadow: var(--shadow-hover);
            z-index: 100;
        }

        .scroll-top.visible {
            opacity: 1;
            visibility: visible;
        }

        .scroll-top:hover {
            transform: translateY(-3px);
            background: #e6c200;
        }

        /* ===== RESPONSIVE ===== */
        @media (max-width: 1200px) {
            .museums-grid {
                grid-template-columns: repeat(3, 1fr);
            }
            .museum-works-grid {
                grid-template-columns: repeat(4, 1fr);
            }
        }

        @media (max-width: 992px) {
            .museums-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .museum-works-grid {
                grid-template-columns: repeat(3, 1fr);
            }
        }

        @media (max-width: 768px) {
            .page-title {
                font-size: 2rem;
            }
            .global-stats {
                flex-direction: column;
                gap: 0.5rem;
            }
            .cities-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .museum-works-grid {
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media (max-width: 576px) {
            .museums-grid {
                grid-template-columns: 1fr;
            }
            .cities-grid {
                grid-template-columns: 1fr;
            }
            .museum-works-grid {
                grid-template-columns: 1fr;
            }
            .scroll-top {
                bottom: 1rem;
                right: 1rem;
            }
        }
    </style>
</head>

<body>
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="container">
            <!-- HEADER -->
            <div class="page-header">
                <h1 class="page-title">
                    <i class="fas fa-landmark"></i>
                    Musées
                </h1>
                <div class="global-stats" id="global-stats">
                    <span><i class="fas fa-spinner fa-spin"></i> Chargement...</span>
                </div>
            </div>

            <!-- VUE LISTE (par défaut) -->
            <div id="list-view">
                <!-- RECHERCHE PAYS -->
                <div class="search-section">
                    <div class="search-wrapper">
                        <div class="search-card">
                            <i class="fas fa-search search-icon"></i>
                            <input type="text" id="country-search" class="search-input" 
                                   placeholder="Rechercher un pays..." autocomplete="off">
                            <button class="search-reset" id="reset-search" style="display: none;">
                                Effacer
                            </button>
                        </div>
                    </div>
                </div>

                <!-- PANEL PAYS -->
                <div id="countries-panel" class="countries-panel">
                    <div class="countries-header">
                        <i class="fas fa-globe" style="margin-right: 0.5rem;"></i> Sélectionnez un pays
                    </div>
                    <div id="countries-list" class="countries-list"></div>
                </div>

                <!-- FILTRES ACTIFS -->
                <div id="active-filters" class="active-filters" style="display: none;">
                    <div class="filter-badge" id="country-filter">
                        <span id="active-country-name"></span>
                        <i class="fas fa-times" onclick="resetCountry()"></i>
                    </div>
                    <div class="filter-badge" id="city-filter" style="display: none;">
                        <span id="active-city-name"></span>
                        <i class="fas fa-times" onclick="resetCity()"></i>
                    </div>
                    <button class="clear-filters" onclick="resetAllFilters()">Effacer tout</button>
                </div>

                <!-- VILLES -->
                <div id="cities-section" class="cities-section" style="display: none;">
                    <div class="section-header">
                        <h3><i class="fas fa-city"></i> Villes</h3>
                    </div>
                    <div id="cities-container" class="cities-grid">
                        <div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>
                    </div>
                </div>

                <!-- MUSÉES -->
                <div class="museums-header">
                    <h3 id="museums-title"><i class="fas fa-landmark"></i> Tous les musées</h3>
                    <span class="museums-count" id="museums-count">0</span>
                </div>
                
                <div id="museums-container" class="museums-grid">
                    <div class="loading">
                        <i class="fas fa-spinner fa-spin"></i> Chargement des musées...
                    </div>
                </div>
                
                <div id="view-more-container" class="view-more-container" style="display: none;">
                    <button class="btn-view-more" onclick="loadMoreMuseums()">
                        Voir plus
                    </button>
                </div>
            </div>

            <!-- VUE DÉTAIL MUSÉE -->
            <div id="detail-view" class="museum-detail-view">
                <div class="back-button" onclick="showListView()">
                    <i class="fas fa-arrow-left"></i> Retour à la liste
                </div>
                <div id="museum-detail-content"></div>
            </div>
        </div>
    </div>

    <!-- BOUTON SCROLL TO TOP -->
    <div class="scroll-top" id="scroll-top">
        <i class="fas fa-arrow-up"></i>
    </div>

    {% include 'footer.html' %}

    <script>
        const currentLang = '{{ session.get("language", "fr") }}';
        let allCountries = [], allMuseums = [], filteredMuseums = [], citiesData = [];
        let currentCountry = '', currentCity = '', currentMuseumId = null;
        let museumsOffset = 20, museumsPerPage = 20;

        // ===== INITIALISATION =====
        document.addEventListener('DOMContentLoaded', function() {
            loadCountries();
            loadMuseums();
            initScrollToTop();
            initEventListeners();
        });

        function initEventListeners() {
            document.getElementById('country-search').addEventListener('input', filterCountries);
            document.getElementById('reset-search').addEventListener('click', resetSearch);
            
            // Cacher le panel pays quand on clique ailleurs
            document.addEventListener('click', function(e) {
                if (!e.target.closest('.search-section') && !e.target.closest('.countries-panel')) {
                    document.getElementById('countries-panel').classList.remove('visible');
                }
            });
        }

        // ===== SCROLL TO TOP =====
        function initScrollToTop() {
            const scrollBtn = document.getElementById('scroll-top');
            window.addEventListener('scroll', () => {
                scrollBtn.classList.toggle('visible', window.scrollY > 400);
            });
            scrollBtn.addEventListener('click', () => {
                window.scrollTo({ top: 0, behavior: 'smooth' });
            });
        }

        // ===== CHARGEMENT DES DONNÉES =====
        async function loadCountries() {
            try {
                const res = await fetch(`/api/museums/countries?lang=${currentLang}`);
                allCountries = await res.json();
                allCountries.sort((a, b) => a.name.localeCompare(b.name));
            } catch (e) { 
                console.error('Erreur chargement pays:', e);
            }
        }

        async function loadMuseums() {
            try {
                const res = await fetch(`/api/museums/list?lang=${currentLang}`);
                allMuseums = await res.json();
                allMuseums.sort((a, b) => (b.oeuvres_count || 0) - (a.oeuvres_count || 0));
                filteredMuseums = [...allMuseums];
                
                updateGlobalStats();
                displayMuseums(filteredMuseums.slice(0, museumsPerPage));
                updateMuseumsCount();
                
                if (filteredMuseums.length > museumsPerPage) {
                    document.getElementById('view-more-container').style.display = 'block';
                }
                
            } catch (e) { 
                console.error('Erreur chargement musées:', e);
                document.getElementById('museums-container').innerHTML = 
                    '<div class="empty-state">Erreur de chargement</div>';
            }
        }

        async function loadMuseumDetail(museumId) {
            try {
                const res = await fetch(`/api/museum/${museumId}/works?lang=${currentLang}`);
                const data = await res.json();
                displayMuseumDetail(data);
            } catch (e) {
                console.error('Erreur chargement détail musée:', e);
            }
        }

        // ===== STATS GLOBALES =====
        function updateGlobalStats() {
            const totalMuseums = allMuseums.length;
            const totalWorks = allMuseums.reduce((sum, m) => sum + (m.oeuvres_count || 0), 0);
            
            document.getElementById('global-stats').innerHTML = `
                <span><i class="fas fa-landmark"></i> ${totalMuseums} musées</span>
                <span><i class="fas fa-palette"></i> ${totalWorks.toLocaleString()} œuvres</span>
            `;
        }

        // ===== RECHERCHE PAYS =====
        function filterCountries() {
            const q = document.getElementById('country-search').value.toLowerCase().trim();
            document.getElementById('reset-search').style.display = q ? 'block' : 'none';
            
            const filtered = q ? allCountries.filter(c => 
                c.name.toLowerCase().includes(q)
            ) : allCountries;
            
            displayCountries(filtered);
            document.getElementById('countries-panel').classList.add('visible');
        }

        function displayCountries(countries) {
            const list = document.getElementById('countries-list');
            if (!countries.length) {
                list.innerHTML = '<div class="country-item" style="justify-content:center;">Aucun pays trouvé</div>';
                return;
            }
            
            list.innerHTML = countries.map(c => `
                <div class="country-item" onclick="selectCountry('${c.name.replace(/'/g, "\\'")}')">
                    <span class="country-name">
                        <i class="fas fa-flag"></i>${c.name}
                    </span>
                    <span class="country-stats">
                        <span><i class="fas fa-landmark"></i>${c.museums}</span>
                        <span><i class="fas fa-palette"></i>${c.works}</span>
                    </span>
                </div>
            `).join('');
        }

        // ===== SÉLECTION PAYS =====
        async function selectCountry(name) {
            currentCountry = name;
            currentCity = '';
            
            document.getElementById('countries-panel').classList.remove('visible');
            document.getElementById('country-search').value = name;
            document.getElementById('reset-search').style.display = 'block';
            
            document.getElementById('active-filters').style.display = 'flex';
            document.getElementById('active-country-name').textContent = name;
            document.getElementById('city-filter').style.display = 'none';
            
            await loadCities(name);
            filterMuseums();
            
            document.getElementById('cities-section').style.display = 'block';
        }

        // ===== CHARGEMENT VILLES =====
        async function loadCities(country) {
            try {
                document.getElementById('cities-container').innerHTML = 
                    '<div class="loading"><i class="fas fa-spinner fa-spin"></i> Chargement...</div>';
                
                const res = await fetch(`/api/museums/cities?country=${encodeURIComponent(country)}&lang=${currentLang}`);
                citiesData = await res.json();
                citiesData.sort((a, b) => b.museums - a.museums);
                
                displayCities(citiesData);
            } catch (e) { 
                console.error('Erreur chargement villes:', e);
                document.getElementById('cities-container').innerHTML = 
                    '<div class="empty-state">Erreur de chargement</div>';
            }
        }

        function displayCities(cities) {
            const container = document.getElementById('cities-container');
            
            if (!cities.length) {
                container.innerHTML = '<div class="empty-state">Aucune ville trouvée</div>';
                return;
            }
            
            container.innerHTML = cities.map(c => `
                <div class="city-card ${currentCity === c.name ? 'active' : ''}" 
                     onclick="selectCity('${c.name.replace(/'/g, "\\'")}')">
                    <div class="city-name">${c.name}</div>
                    <div class="city-stats">
                        <span><i class="fas fa-landmark"></i>${c.museums}</span>
                        <span><i class="fas fa-palette"></i>${c.works}</span>
                    </div>
                </div>
            `).join('');
        }

        // ===== SÉLECTION VILLE =====
        function selectCity(cityName) {
            currentCity = currentCity === cityName ? '' : cityName;
            
            document.querySelectorAll('.city-card').forEach(c => {
                if (c.querySelector('.city-name').textContent === cityName) {
                    c.classList.toggle('active', currentCity === cityName);
                } else {
                    c.classList.remove('active');
                }
            });
            
            if (currentCity) {
                document.getElementById('city-filter').style.display = 'flex';
                document.getElementById('active-city-name').textContent = currentCity;
            } else {
                document.getElementById('city-filter').style.display = 'none';
            }
            
            filterMuseums();
        }

        // ===== RÉINITIALISATION FILTRES =====
        function resetCountry() {
            currentCountry = '';
            currentCity = '';
            
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            document.getElementById('cities-section').style.display = 'none';
            document.getElementById('active-filters').style.display = 'none';
            
            filterMuseums();
        }

        function resetCity() {
            currentCity = '';
            document.getElementById('city-filter').style.display = 'none';
            
            document.querySelectorAll('.city-card').forEach(c => c.classList.remove('active'));
            filterMuseums();
        }

        function resetAllFilters() {
            currentCountry = '';
            currentCity = '';
            
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            document.getElementById('cities-section').style.display = 'none';
            document.getElementById('active-filters').style.display = 'none';
            document.getElementById('countries-panel').classList.remove('visible');
            
            filterMuseums();
        }

        function resetSearch() {
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            displayCountries(allCountries);
        }

        // ===== FILTRAGE MUSÉES =====
        function filterMuseums() {
            let filtered = allMuseums;
            
            if (currentCountry) {
                filtered = filtered.filter(m => m.pays === currentCountry);
            }
            if (currentCity) {
                filtered = filtered.filter(m => m.ville === currentCity);
            }
            
            filteredMuseums = filtered;
            museumsOffset = 20;
            displayMuseums(filtered.slice(0, museumsPerPage));
            updateMuseumsCount();
            
            if (currentCity) {
                document.getElementById('museums-title').innerHTML = `<i class="fas fa-landmark"></i> ${currentCity}`;
            } else if (currentCountry) {
                document.getElementById('museums-title').innerHTML = `<i class="fas fa-landmark"></i> ${currentCountry}`;
            } else {
                document.getElementById('museums-title').innerHTML = '<i class="fas fa-landmark"></i> Tous les musées';
            }
            
            if (filtered.length > museumsPerPage) {
                document.getElementById('view-more-container').style.display = 'block';
            } else {
                document.getElementById('view-more-container').style.display = 'none';
            }
        }

        // ===== AFFICHAGE MUSÉES =====
        function displayMuseums(museums) {
            const container = document.getElementById('museums-container');
            
            if (!museums?.length) {
                container.innerHTML = '<div class="empty-state">Aucun musée trouvé</div>';
                return;
            }
            
            container.innerHTML = museums.map(m => `
                <div class="museum-card" onclick="showMuseumDetail('${m.id}')">
                    <div class="museum-icon">
                        <i class="fas fa-museum"></i>
                    </div>
                    <div class="museum-name" title="${m.nom || 'Musée'}">${m.nom || 'Musée'}</div>
                    <div class="museum-location">
                        <i class="fas fa-map-marker-alt"></i> ${m.ville || '?'}, ${m.pays || '?'}
                    </div>
                    <div class="museum-works">
                        <i class="fas fa-palette"></i> ${m.oeuvres_count || 0} œuvre${m.oeuvres_count > 1 ? 's' : ''}
                    </div>
                </div>
            `).join('');
        }

        function loadMoreMuseums() {
            const next = filteredMuseums.slice(museumsOffset, museumsOffset + museumsPerPage);
            if (!next.length) return;
            
            const container = document.getElementById('museums-container');
            
            next.forEach(m => {
                const div = document.createElement('div');
                div.className = 'museum-card';
                div.setAttribute('onclick', `showMuseumDetail('${m.id}')`);
                div.innerHTML = `
                    <div class="museum-icon">
                        <i class="fas fa-museum"></i>
                    </div>
                    <div class="museum-name" title="${m.nom || 'Musée'}">${m.nom || 'Musée'}</div>
                    <div class="museum-location">
                        <i class="fas fa-map-marker-alt"></i> ${m.ville || '?'}, ${m.pays || '?'}
                    </div>
                    <div class="museum-works">
                        <i class="fas fa-palette"></i> ${m.oeuvres_count || 0} œuvre${m.oeuvres_count > 1 ? 's' : ''}
                    </div>
                `;
                container.appendChild(div);
            });
            
            museumsOffset += museumsPerPage;
            
            if (museumsOffset >= filteredMuseums.length) {
                document.getElementById('view-more-container').style.display = 'none';
            }
        }

        function updateMuseumsCount() {
            document.getElementById('museums-count').textContent = filteredMuseums.length;
        }

        // ===== VUE DÉTAIL MUSÉE =====
        async function showMuseumDetail(museumId) {
            currentMuseumId = museumId;
            document.getElementById('list-view').style.display = 'none';
            document.getElementById('detail-view').style.display = 'block';
            
            await loadMuseumDetail(museumId);
        }

        function showListView() {
            document.getElementById('list-view').style.display = 'block';
            document.getElementById('detail-view').style.display = 'none';
            currentMuseumId = null;
        }

        function displayMuseumDetail(data) {
            const container = document.getElementById('museum-detail-content');
            
            container.innerHTML = `
                <div class="museum-detail-header">
                    <h2 class="museum-detail-title">${data.museum.nom || 'Musée'}</h2>
                    <div class="museum-detail-meta">
                        <span><i class="fas fa-map-marker-alt"></i> ${data.museum.ville || '?'}, ${data.museum.pays || '?'}</span>
                        <span><i class="fas fa-palette"></i> ${data.works.length} œuvre${data.works.length > 1 ? 's' : ''}</span>
                    </div>
                    
                    <h3 style="margin: 2rem 0 1rem;">Œuvres dans ce musée</h3>
                    
                    <div class="museum-works-grid">
                        ${data.works.map(work => `
                            <div class="museum-work-item" onclick="window.location.href='/oeuvre/${work.id}'">
                                <img src="${work.image_url || '/static/images/placeholder.jpg'}" 
                                     alt="${work.titre || 'Sans titre'}"
                                     loading="lazy"
                                     onerror="this.src='/static/images/placeholder.jpg'">
                            </div>
                        `).join('')}
                    </div>
                </div>
            `;
        }
    </script>
</body>
</html>
