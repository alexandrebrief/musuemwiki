<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🥚 Easter egg - {{ site_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #FF6B6B, #4ECDC4, #FFE66D, #FF9F1C, #BF8FAD);
            background-size: 400% 400%;
            animation: gradientShift 15s ease infinite;
            color: #2c3e50;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background 1s ease;
        }
        
        @keyframes gradientShift {
            0% { background-position: 0% 50%; }
            25% { background-position: 50% 100%; }
            50% { background-position: 100% 50%; }
            75% { background-position: 50% 0%; }
            100% { background-position: 0% 50%; }
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        /* Particules */
        .particle {
            position: absolute;
            width: 3px;
            height: 3px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: float 10s infinite linear;
            pointer-events: none;
        }
        
        @keyframes float {
            0% {
                transform: translateY(100vh) translateX(0);
                opacity: 0;
            }
            10% {
                opacity: 0.5;
            }
            90% {
                opacity: 0.5;
            }
            100% {
                transform: translateY(-100px) translateX(100px);
                opacity: 0;
            }
        }
        
        /* Formes géométriques */
        .shape {
            position: absolute;
            opacity: 0.1;
            pointer-events: none;
            animation: rotate 20s infinite linear;
        }
        
        @keyframes rotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(360deg); }
        }
        
        .shape.square {
            width: 50px;
            height: 50px;
            background: #2c3e50;
            opacity: 0.05;
        }
        
        .shape.circle {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: #e6d8c3;
            opacity: 0.1;
        }
        
        .shape.triangle {
            width: 0;
            height: 0;
            border-left: 25px solid transparent;
            border-right: 25px solid transparent;
            border-bottom: 50px solid #2c3e50;
            opacity: 0.05;
            background: transparent;
        }
        
        /* Carte principale */
        .surprise-card {
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2.5rem 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.15);
            text-align: center;
            max-width: 800px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.8s ease-out;
            border: 1px solid rgba(255,255,255,0.3);
            transition: transform 0.1s;
        }
        
        .surprise-card.shake {
            animation: shake 0.5s cubic-bezier(0.36, 0.07, 0.19, 0.97) both;
        }
        
        @keyframes shake {
            0% { transform: translate(1px, 1px) rotate(0deg); }
            10% { transform: translate(-1px, -2px) rotate(-1deg); }
            20% { transform: translate(-3px, 0px) rotate(1deg); }
            30% { transform: translate(3px, 2px) rotate(0deg); }
            40% { transform: translate(1px, -1px) rotate(1deg); }
            50% { transform: translate(-1px, 2px) rotate(-1deg); }
            60% { transform: translate(-3px, 1px) rotate(0deg); }
            70% { transform: translate(3px, 1px) rotate(-1deg); }
            80% { transform: translate(-1px, -1px) rotate(1deg); }
            90% { transform: translate(1px, 2px) rotate(0deg); }
            100% { transform: translate(1px, -2px) rotate(-1deg); }
        }
        
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #5d6d7e;
            margin-bottom: 2rem;
            font-style: italic;
        }
        
        /* Cadre de citation - avec bordure */
        .quote-frame {
            background: rgba(255, 255, 255, 0.5);
            border: 2px solid #e6d8c3;
            border-radius: 20px;
            padding: 1.5rem;
            margin: 1.5rem 0;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.05);
        }
        
        .original-quote {
            font-size: 1.5rem;
            font-weight: 400;
            margin: 0.5rem 0 0.5rem;
            font-family: 'Playfair Display', serif;
            line-height: 1.5;
            color: #2c3e50;
            animation: fadeIn 0.5s;
            font-style: italic;
        }
        
        .translation {
            font-size: 0.9rem;
            color: #5d6d7e;
            margin: 0.3rem auto 0.5rem;
            font-style: normal;
            text-align: center;
            animation: fadeIn 0.5s 0.1s both;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .quote-author {
            color: #5d6d7e;
            font-size: 0.95rem;
            margin-top: 0.3rem;
            font-style: italic;
        }
        
        /* Boutons */
        .button-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.6rem 1.8rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
        }
        
        .btn-primary {
            background: #2c3e50;
            color: #e6d8c3;
        }
        
        .btn-primary:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(44,62,80,0.2);
        }
        
        .btn-random {
            background: #e6d8c3;
            color: #2c3e50;
            border-color: #e6d8c3;
        }
        
        .btn-random:hover {
            background: #d4c9b9;
            transform: translateY(-2px);
        }
        
        .secret-message {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #8e9aab;
            cursor: pointer;
            transition: all 0.3s;
            padding: 0.3rem 1rem;
            display: inline-block;
            border-radius: 30px;
            background: rgba(255,255,255,0.3);
            position: relative;
            z-index: 20;
        }
        
        .secret-message:hover {
            color: #2c3e50;
            background: rgba(255,255,255,0.8);
        }
        
        /* Confettis */
        .confetti {
            position: absolute;
            width: 10px;
            height: 10px;
            background: #f00;
            opacity: 0;
            pointer-events: none;
            z-index: 1000;
            border-radius: 2px;
            animation: confettiFall 3s ease-out forwards;
        }
        
        @keyframes confettiFall {
            0% {
                transform: translateY(-20vh) rotate(0deg);
                opacity: 1;
            }
            100% {
                transform: translateY(120vh) rotate(720deg);
                opacity: 0;
            }
        }
        
        @media (max-width: 768px) {
            .surprise-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .original-quote {
                font-size: 1.2rem;
            }
        }
    </style>
</head>
<body id="mainBody">
    {% include 'navbar.html' %}

    <!-- Formes géométriques -->
    <div class="shape square" style="top: 10%; left: 5%; width: 80px; height: 80px;"></div>
    <div class="shape circle" style="top: 70%; right: 10%; width: 100px; height: 100px;"></div>
    <div class="shape triangle" style="bottom: 20%; left: 15%;"></div>
    <div class="shape circle" style="top: 30%; right: 25%; width: 60px; height: 60px;"></div>
    <div class="shape square" style="bottom: 40%; left: 10%; width: 40px; height: 40px;"></div>
    <div class="shape triangle" style="top: 80%; left: 30%;"></div>
    
    <!-- Particules -->
    <div id="particles-container"></div>
    
    <!-- Conteneur pour les confettis -->
    <div id="confetti-container" style="position: fixed; top: 0; left: 0; width: 100%; height: 100%; pointer-events: none; z-index: 9999;"></div>

    <div class="main-content">
        <div class="surprise-card" id="surpriseCard">
            <h1>BRAVO !</h1>
            <div class="subtitle">&#40;mais chut, tu as trouvé l'easter egg de mon site&#41;</div>
            
            <div class="quote-frame">
                <div class="original-quote" id="originalQuote"></div>
                <div class="translation" id="translation"></div>
                <div class="quote-author" id="author"></div>
            </div>
            
            <div class="button-container">
                <a href="/" class="btn btn-primary">Retour à l'accueil</a>
                <button class="btn btn-random" onclick="randomQuote()">
                    <i class="fas fa-random me-2"></i>Nouvelle citation
                </button>
            </div>
            
            <div class="secret-message" onclick="explodeConfetti()">
                Ne cliquez pas ici
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    
    <script>
        // 10 citations sur l'art dans différentes langues
        const quotes = [
            { 
                original: "L'art est le mensonge qui nous permet de comprendre la vérité.", 
                translation: "",
                author: "Pablo Picasso",
                language: "fr" 
            },
            { 
                original: "Art washes away from the soul the dust of everyday life.", 
                translation: "L'art lave notre âme de la poussière du quotidien.",
                author: "Pablo Picasso",
                language: "en"
            },
            { 
                original: "芸術は自然の模倣ではなく、自然の理想化である。", 
                translation: "L'art n'est pas l'imitation de la nature, mais son idéalisation.",
                author: "Aristote",
                language: "jp"
            },
            { 
                original: "Искусство — это посредник того, что нельзя высказать.", 
                translation: "L'art est l'intermédiaire de ce qu'on ne peut pas exprimer.",
                author: "Johann Wolfgang von Goethe",
                language: "ru"
            },
            { 
                original: "الفن هو الكذبة التي تسمح لنا بفهم الحقيقة.", 
                translation: "L'art est le mensonge qui nous permet de comprendre la vérité.",
                author: "Pablo Picasso",
                language: "ar"
            },
            { 
                original: "艺术是生活的镜子。", 
                translation: "L'art est le miroir de la vie.",
                author: "Léon Tolstoï",
                language: "zh"
            },
            { 
                original: "Kunst ist die schönste aller Lügen.", 
                translation: "L'art est le plus beau de tous les mensonges.",
                author: "Pablo Picasso",
                language: "de"
            },
            { 
                original: "Umculo wumphefumulo womhlaba.", 
                translation: "L'art est l'âme du monde.",
                author: "Proverbe zoulou",
                language: "zu"
            },
            { 
                original: "El arte es la expresión de los más profundos pensamientos por el camino más sencillo.", 
                translation: "L'art est l'expression des pensées les plus profondes par le chemin le plus simple.",
                author: "Albert Einstein",
                language: "es"
            },
            { 
                original: "A arte é a contemplação do mundo no seu estado de graça.", 
                translation: "L'art est la contemplation du monde dans son état de grâce.",
                author: "Albert Camus",
                language: "pt"
            }
        ];

        let currentIndex = 0;
        const totalQuotes = quotes.length;

        // Palettes de couleurs joyeuses
        const colorPalettes = [
            ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', '#BF8FAD'],
            ['#FF8A5C', '#B83B5E', '#F9ED69', '#6A2C70', '#08D9D6'],
            ['#FFC93C', '#A2D0C1', '#FF5E5E', '#3B9AE1', '#E98580'],
            ['#F38181', '#FCE38A', '#EAFFD0', '#95E1D3', '#A8E6CF'],
            ['#FFAAA5', '#FFD3B6', '#DCA47C', '#9B7B6B', '#698474'],
            ['#FFB8B8', '#C6D7EB', '#F3E0B5', '#C5A880', '#9F5F80'],
            ['#FFC0CB', '#B5EAD7', '#C7CEEA', '#F9D6B7', '#E2F0CB'],
            ['#FF9A8B', '#FF6A88', '#FF99AC', '#FFB6C1', '#FFC3A0']
        ];

        function randomQuote() {
            currentIndex = Math.floor(Math.random() * totalQuotes);
            const quote = quotes[currentIndex];
            
            document.getElementById('originalQuote').textContent = '"' + quote.original + '"';
            
            // Si la citation n'est pas en français, afficher la traduction entre parenthèses
            if (quote.language !== 'fr' && quote.translation) {
                document.getElementById('translation').textContent = '(' + quote.translation + ')';
            } else {
                document.getElementById('translation').textContent = '';
            }
            
            document.getElementById('author').textContent = quote.author;
        }

        function changeBackground() {
            // Choisir une palette aléatoire
            const palette = colorPalettes[Math.floor(Math.random() * colorPalettes.length)];
            
            // Créer un dégradé avec 4 couleurs de la palette
            const gradient = `linear-gradient(135deg, 
                ${palette[0]}, 
                ${palette[1]}, 
                ${palette[2]}, 
                ${palette[3]}, 
                ${palette[4]})`;
            
            document.body.style.background = gradient;
            document.body.style.backgroundSize = '400% 400%';
            
            // Effet de surprise
            const message = document.querySelector('.secret-message');
            message.style.transform = 'scale(1.1)';
            setTimeout(() => {
                message.style.transform = 'scale(1)';
            }, 200);
        }

        function createColorBurst() {
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const particle = document.createElement('div');
                    particle.className = 'particle';
                    particle.style.left = Math.random() * 100 + '%';
                    particle.style.top = Math.random() * 100 + '%';
                    particle.style.background = `hsl(${Math.random() * 360}, 80%, 60%)`;
                    particle.style.width = (Math.random() * 8 + 2) + 'px';
                    particle.style.height = particle.style.width;
                    particle.style.animation = 'float 3s forwards';
                    document.getElementById('particles-container').appendChild(particle);
                    
                    setTimeout(() => particle.remove(), 3000);
                }, i * 20);
            }
        }

        // Créer des particules en arrière-plan
        function createBackgroundParticles() {
            const container = document.getElementById('particles-container');
            for (let i = 0; i < 50; i++) {
                const particle = document.createElement('div');
                particle.className = 'particle';
                particle.style.left = Math.random() * 100 + '%';
                particle.style.top = Math.random() * 100 + '%';
                particle.style.animationDuration = (Math.random() * 10 + 5) + 's';
                particle.style.animationDelay = Math.random() * 5 + 's';
                particle.style.background = `hsl(${Math.random() * 360}, 70%, 70%)`;
                particle.style.width = (Math.random() * 6 + 2) + 'px';
                particle.style.height = particle.style.width;
                particle.style.opacity = '0.3';
                container.appendChild(particle);
            }
        }

        // Explosion de confettis avec secousse
        function explodeConfetti() {
            // 1. Faire trembler la carte
            const card = document.getElementById('surpriseCard');
            card.classList.add('shake');
            
            // 2. Après un court délai, enlever la classe shake
            setTimeout(() => {
                card.classList.remove('shake');
            }, 500);
            
            // 3. Changer le fond APRÈS 0.8s (un peu moins d'1 seconde)
            setTimeout(() => {
                changeBackground();
            }, 800);
            
            // 4. Créer l'explosion de confettis qui tombent de plus haut
            const container = document.getElementById('confetti-container');
            const colors = ['#FF6B6B', '#4ECDC4', '#FFE66D', '#FF9F1C', '#BF8FAD', '#FF8A5C', '#B83B5E', '#F9ED69', '#6A2C70', '#08D9D6', '#FFC93C', '#A2D0C1', '#FF5E5E', '#3B9AE1', '#E98580'];
            
            // Créer 150 confettis
            for (let i = 0; i < 150; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    
                    // Position de départ aléatoire sur toute la largeur
                    const startX = Math.random() * 100; // 0-100% de la largeur
                    
                    // Couleur aléatoire
                    confetti.style.background = colors[Math.floor(Math.random() * colors.length)];
                    
                    // Taille aléatoire
                    const size = Math.random() * 12 + 5;
                    confetti.style.width = size + 'px';
                    confetti.style.height = size + 'px';
                    
                    // Position de départ en haut de l'écran (au-dessus)
                    confetti.style.left = startX + '%';
                    confetti.style.top = '-10%'; // Commence au-dessus de l'écran
                    
                    // Animation avec délai et durée aléatoires
                    confetti.style.animation = `confettiFall ${Math.random() * 2 + 2}s ease-out forwards`;
                    confetti.style.animationDelay = Math.random() * 0.3 + 's';
                    
                    // Rotation initiale aléatoire
                    confetti.style.transform = `rotate(${Math.random() * 360}deg)`;
                    
                    container.appendChild(confetti);
                    
                    // Supprimer après l'animation
                    setTimeout(() => {
                        confetti.remove();
                    }, 5000);
                }, i * 5); // Décaler chaque confetti
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            randomQuote();
            createBackgroundParticles();
        });
    </script>
</body>
</html>
