<!DOCTYPE html>
<html lang="fr">
<head>
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pour Kathy - {{ site_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: #1e2b3a;  /* Bleu profond élégant */
            color: #e6d8c3;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        h1, h2, h3, h4, h5, h6, .message-text {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: #e6d8c3;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        .message-card {
            background: rgba(44, 62, 80, 0.6);  /* #2c3e50 semi-transparent */
            backdrop-filter: blur(8px);
            border-radius: 20px;
            padding: 3rem 4rem;
            box-shadow: 0 15px 35px rgba(0, 0, 0, 0.3);
            text-align: center;
            max-width: 500px;
            width: 100%;
            border: 1px solid rgba(230, 216, 195, 0.15);
            animation: fadeIn 1s ease-out;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        .heart {
            font-size: 3rem;
            color: #e6d8c3;
            margin: 1rem 0;
            animation: float 3s infinite ease-in-out;
            opacity: 0.9;
        }
        
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }
        
        .message-text {
            font-size: 2.5rem;
            font-weight: 500;
            margin-bottom: 0.5rem;
            line-height: 1.2;
            color: #e6d8c3;
            letter-spacing: 1px;
        }
        
        .date {
            font-size: 1rem;
            color: #e6d8c3;
            opacity: 0.6;
            font-style: italic;
            margin-bottom: 1rem;
            letter-spacing: 2px;
        }
        
        .back-link {
            display: inline-block;
            margin-top: 1.5rem;
            color: #e6d8c3;
            text-decoration: none;
            font-size: 0.9rem;
            padding: 0.6rem 2rem;
            border-radius: 30px;
            border: 1px solid rgba(230, 216, 195, 0.3);
            transition: all 0.3s ease;
            background: rgba(230, 216, 195, 0.05);
        }
        
        .back-link:hover {
            background: #e6d8c3;
            color: #1e2b3a;
            border-color: #e6d8c3;
            transform: translateY(-2px);
        }
        
        /* Effet de lumière subtil */
        .message-card::after {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 1px;
            background: linear-gradient(90deg, transparent, rgba(230, 216, 195, 0.3), transparent);
        }
        
        @media (max-width: 768px) {
            .message-card {
                padding: 2rem 1.5rem;
            }
            .message-text {
                font-size: 2rem;
            }
            .heart {
                font-size: 2.5rem;
            }
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="message-card" style="position: relative;">
            <div class="message-text">Pour Kathy</div>
            <div class="heart">❤️</div>
            <div class="date">28.01.2003</div>
            <a href="javascript:history.back()" class="back-link">
                <i class="fas fa-arrow-left me-2"></i>Retour
            </a>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
