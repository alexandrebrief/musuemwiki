        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background: linear-gradient(135deg, #f5f0e8, #e6d8c3, #f5f0e8);
            background-size: 400% 400%;
            animation: gradientBG 15s ease infinite;
            color: #2c3e50;
            line-height: 1.5;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        @keyframes gradientBG {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
        }
        
        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
        }
        
        /* ===== ANIMATIONS VOLANTES ===== */
        .floating-object {
            position: absolute;
            pointer-events: none;
            animation: floatAround 15s infinite linear;
            opacity: 0.1;
            font-size: 2.5rem;
            color: #2c3e50;
        }
        
        @keyframes floatAround {
            0% { transform: translate(0, 0) rotate(0deg); }
            25% { transform: translate(100px, 50px) rotate(90deg); }
            50% { transform: translate(50px, 150px) rotate(180deg); }
            75% { transform: translate(-50px, 80px) rotate(270deg); }
            100% { transform: translate(0, 0) rotate(360deg); }
        }
        
        /* Confettis */
        .confetti {
            position: absolute;
            width: 8px;
            height: 8px;
            background: #2c3e50;
            opacity: 0.2;
            animation: fall 4s infinite linear;
        }
        
        @keyframes fall {
            0% { transform: translateY(-100px) rotate(0deg); opacity: 0; }
            10% { opacity: 0.3; }
            90% { opacity: 0.3; }
            100% { transform: translateY(100vh) rotate(720deg); opacity: 0; }
        }
        
        /* Carte principale */
        .surprise-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 30px;
            padding: 2.5rem 3rem;
            box-shadow: 0 30px 60px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 800px;
            width: 100%;
            z-index: 10;
            position: relative;
            animation: popIn 0.8s ease-out;
            border: 1px solid rgba(44,62,80,0.1);
        }
        
        @keyframes popIn {
            0% { transform: scale(0.9); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
        
        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .subtitle {
            font-size: 1rem;
            color: #5d6d7e;
            margin-bottom: 2rem;
            font-style: italic;
        }
        
        /* Cadre de citation */
        .quote-frame {
            background: #f5f0e8;
            border-radius: 20px;
            padding: 2rem;
            margin: 1.5rem 0;
            border: 1px solid #d4c9b9;
            position: relative;
            min-height: 200px;
            display: flex;
            flex-direction: column;
            justify-content: center;
        }
        
        .quote {
            font-size: 1.3rem;
            font-weight: 300;
            margin: 0.5rem 0;
            font-family: 'Playfair Display', serif;
            line-height: 1.5;
            color: #2c3e50;
            animation: fadeIn 0.5s;
        }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        
        .quote-author {
            color: #8e9aab;
            font-size: 0.95rem;
            margin-top: 0.5rem;
            font-style: italic;
        }
        
        .quote-counter {
            font-size: 0.8rem;
            color: #5d6d7e;
            margin-top: 0.5rem;
            opacity: 0.7;
        }
        
        /* Boutons */
        .button-container {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
            flex-wrap: wrap;
        }
        
        .btn {
            padding: 0.6rem 1.5rem;
            border-radius: 50px;
            text-decoration: none;
            font-weight: 500;
            transition: all 0.3s;
            border: 1px solid transparent;
            cursor: pointer;
            font-size: 0.9rem;
            font-family: 'Inter', sans-serif;
        }
        
        .btn-primary {
            background: #2c3e50;
            color: #e6d8c3;
        }
        
        .btn-primary:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(44,62,80,0.2);
        }
        
        .btn-secondary {
            background: transparent;
            color: #2c3e50;
            border-color: #2c3e50;
        }
        
        .btn-secondary:hover {
            background: #2c3e50;
            color: #e6d8c3;
            transform: translateY(-2px);
        }
        
        .btn-random {
            background: #e6d8c3;
            color: #2c3e50;
            border-color: #e6d8c3;
        }
        
        .btn-random:hover {
            background: #d4c9b9;
            transform: translateY(-2px);
        }
        
        .secret-message {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #8e9aab;
            cursor: pointer;
            transition: all 0.3s;
        }
        
        .secret-message:hover {
            color: #2c3e50;
        }

            .surprise-card {
                padding: 1.5rem;
            }
            h1 {
                font-size: 2rem;
            }
            .quote {
                font-size: 1.1rem;
            }
        }

            { text: "Cinema is a matter of what's in the frame and what's out.", author: "Martin Scorsese" },
            { text: "Theater is a mirror, a sharp reminder of daily existence.", author: "Mikhail Baryshnikov" },
            { text: "Poetry is when an emotion has found its thought and the thought has found words.", author: "Robert Frost" }
        ];

        let currentIndex = 0;
        const totalQuotes = quotes.length;

        function updateQuote() {
            document.getElementById('quote').textContent = '"' + quotes[currentIndex].text + '"';
            document.getElementById('author').textContent = '— ' + quotes[currentIndex].author;
            document.getElementById('current-index').textContent = currentIndex + 1;
            document.getElementById('total-quotes').textContent = totalQuotes;
        }

        function nextQuote() {
            currentIndex = (currentIndex + 1) % totalQuotes;
            updateQuote();
        }

        function previousQuote() {
            currentIndex = (currentIndex - 1 + totalQuotes) % totalQuotes;
            updateQuote();
        }

        function randomQuote() {
            currentIndex = Math.floor(Math.random() * totalQuotes);
            updateQuote();
        }

        function easterEgg() {
            alert('🎉 BRAVO ! Tu as trouvé le secret !\n\nVoici un code caché : ART-IS-LOVE');
            // Créer une explosion de confettis
            for (let i = 0; i < 30; i++) {
                setTimeout(() => {
                    const confetti = document.createElement('div');
                    confetti.className = 'confetti';
                    confetti.style.left = Math.random() * 100 + '%';
                    confetti.style.top = Math.random() * 100 + '%';
                    confetti.style.animation = 'fall 2s forwards';
                    confetti.style.background = `hsl(${Math.random() * 360}, 80%, 50%)`;
                    document.getElementById('confetti-container').appendChild(confetti);
                    
                    setTimeout(() => confetti.remove(), 2000);
                }, i * 30);
            }
        }

        // Créer des confettis en fond
        function createBackgroundConfetti() {
            const container = document.getElementById('confetti-container');
            for (let i = 0; i < 20; i++) {
                const confetti = document.createElement('div');
                confetti.className = 'confetti';
                confetti.style.left = Math.random() * 100 + '%';
                confetti.style.animationDuration = (Math.random() * 3 + 3) + 's';
                confetti.style.animationDelay = Math.random() * 5 + 's';
                confetti.style.background = `hsl(${Math.random() * 360}, 50%, 60%)`;
                confetti.style.width = (Math.random() * 8 + 4) + 'px';
                confetti.style.height = confetti.style.width;
                container.appendChild(confetti);
            }
        }

        // Initialisation
        document.addEventListener('DOMContentLoaded', function() {
            randomQuote();
            createBackgroundConfetti();
        });
    </script>
</body>
</html>
