<!-- Barre de recherche réutilisable -->
<div class="navbar-search">
    <form action="/" method="get" class="d-flex align-items-center w-100" autocomplete="off" id="navbar-search-form">
        <input type="text" 
               name="q" 
               id="search-input"
               class="search-input" 
               placeholder="Rechercher un artiste, une œuvre..."
               value="{{ query if query else '' }}">
        {% if query %}
        <button type="button" class="clear-search" onclick="clearSearch()">
            <i class="fas fa-times"></i>
        </button>
        {% endif %}
        <button type="submit" class="search-button">
            <i class="fas fa-search"></i>
        </button>
    </form>
    <!-- Suggestions -->
    <div id="suggestions" class="suggestions-box" style="display: none;"></div>
</div>

<style>
.navbar-search {
    display: flex;
    align-items: center;
    background: rgba(255,255,255,0.15);
    border-radius: 30px;
    padding: 0.3rem 0.3rem 0.3rem 1rem;
    margin: 0 1rem;
    flex: 0 1 400px;
    border: 1px solid rgba(255,255,255,0.2);
    position: relative;
}

.navbar-search input {
    background: transparent;
    border: none;
    color: white;
    width: 100%;
    padding: 0.4rem 0;
    font-size: 0.95rem;
}

.navbar-search input::placeholder {
    color: rgba(255,255,255,0.7);
}

.navbar-search input:focus {
    outline: none;
}

.clear-search {
    background: transparent;
    border: none;
    color: rgba(255,255,255,0.5);
    padding: 0.2rem 0.5rem;
    cursor: pointer;
    font-size: 0.8rem;
    transition: all 0.2s;
    order: -1;
}

.clear-search:hover {
    color: rgba(255,255,255,0.9);
}

.search-button {
    background: transparent;
    border: none;
    color: white;
    padding: 0.4rem 0.8rem;
    cursor: pointer;
    font-size: 1rem;
    transition: all 0.2s;
}

.search-button:hover {
    transform: scale(1.1);
}

.suggestions-box {
    position: absolute;
    top: 100%;
    left: 0;
    right: 0;
    background: white;
    border: 1px solid #d4c9b9;
    border-radius: 12px;
    box-shadow: 0 8px 16px rgba(44,62,80,0.1);
    z-index: 10000;
    max-height: 250px;
    overflow-y: auto;
    margin-top: 5px;
}

.suggestion-item {
    padding: 10px 15px;
    cursor: pointer;
    border-bottom: 1px solid #f0e8dc;
    font-size: 0.9rem;
    transition: background 0.2s;
}

.suggestion-item.selected {
    background: #f0e8dc;
    border-left: 3px solid #2c3e50;
}

.suggestion-item:hover {
    background: #f5f0e8;
}

.suggestion-item strong {
    font-weight: 500;
    color: #2c3e50;
}

.suggestion-item small {
    color: #8e9aab;
    margin-left: 8px;
    font-size: 0.8rem;
}
</style>

<script>
function clearSearch() {
    document.getElementById('search-input').value = '';
    window.location.href = '/';
}
</script>
