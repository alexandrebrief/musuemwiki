<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer les musées - {{ site_name }}</title>
    
    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ===== VARIABLES - IDENTIQUES AU CSS PRINCIPAL ===== */
        :root {
            --primary: #2c3e50;
            --primary-dark: #1a2634;
            --secondary: #e6d8c3;
            --background: #f5f0e8;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-light: #5d6d7e;
            --text-soft: #8e9aab;
            --white: #ffffff;
            --border: #e0d6c8;
            --border-light: #f0e8dc;
            --accent: #dc3545;
            --shadow: 0 2px 8px rgba(44,62,80,0.03);
            --shadow-hover: 0 4px 12px rgba(44,62,80,0.05);
            --radius: 12px;
            --radius-sm: 6px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
        }

        h1, h2, h3, h4, h5, h6, .block-title {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: var(--primary);
            letter-spacing: -0.02em;
        }

        /* ===== LAYOUT ===== */
        .museum-container {
            max-width: 1400px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        .museum-header {
            margin-bottom: 2rem;
        }

        .museum-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .museum-header h1 i {
            color: var(--secondary);
            background: var(--primary);
            padding: 0.8rem;
            border-radius: 50%;
            font-size: 1.5rem;
        }

        .museum-stats {
            color: var(--text-light);
            font-size: 1rem;
            margin-left: 4rem;
        }

        /* ===== PAYS ===== */
        .section-title {
            font-family: 'Playfair Display', serif;
            font-size: 1.5rem;
            color: var(--primary);
            margin: 2rem 0 1.5rem 0;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            border-bottom: 2px solid var(--secondary);
            padding-bottom: 0.5rem;
        }

        .section-title i {
            color: var(--secondary);
            background: var(--primary);
            padding: 0.5rem;
            border-radius: 50%;
            font-size: 1rem;
        }

        .countries-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(200px, 1fr));
            gap: 1rem;
            margin-bottom: 2rem;
        }

        .country-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1.2rem;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: var(--shadow);
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .country-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--secondary);
        }

        .country-card.active {
            border: 2px solid var(--primary);
            background: #f8f9fa;
        }

        .country-name {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-weight: 500;
            color: var(--primary);
            display: flex;
            align-items: center;
            gap: 0.8rem;
        }

        .country-name i {
            color: var(--secondary);
            font-size: 1.2rem;
            width: 24px;
        }

        .country-count {
            background: var(--secondary);
            color: var(--primary);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.85rem;
            font-weight: 500;
        }

        /* ===== VILLES ===== */
        .cities-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
        }

        .cities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.2rem;
        }

        .cities-header h3 {
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cities-header h3 i {
            color: var(--secondary);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 1rem;
        }

        .city-item {
            background: var(--background);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.8rem 1.2rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.95rem;
        }

        .city-item:hover {
            background: var(--secondary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .city-item.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .city-item.active i {
            color: white;
        }

        .city-item i {
            color: var(--secondary);
            margin-right: 0.5rem;
        }

        .city-count {
            background: rgba(44,62,80,0.1);
            padding: 0.2rem 0.6rem;
            border-radius: 20px;
            font-size: 0.75rem;
            font-weight: 500;
        }

        .city-item.active .city-count {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        /* ===== MUSÉES ===== */
        .museums-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.5rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
        }

        .museums-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1.5rem;
        }

        .museums-header h3 {
            font-size: 1.2rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .museums-header h3 i {
            color: var(--secondary);
        }

        .museums-count {
            background: var(--secondary);
            color: var(--primary);
            padding: 0.4rem 1rem;
            border-radius: 30px;
            font-size: 0.9rem;
            font-weight: 500;
        }

        .museums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 1rem;
        }

        .museum-card {
            background: var(--background);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 1rem;
            cursor: pointer;
            transition: all 0.2s ease;
            display: flex;
            align-items: center;
            gap: 1rem;
            text-decoration: none;
            color: inherit;
        }

        .museum-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-hover);
            border-color: var(--secondary);
        }

        .museum-icon {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, var(--primary), var(--primary-dark));
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--secondary);
            font-size: 1.3rem;
            flex-shrink: 0;
        }

        .museum-content {
            flex: 1;
            min-width: 0;
        }

        .museum-name {
            font-family: 'Playfair Display', serif;
            font-size: 1rem;
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 0.3rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .museum-location {
            font-size: 0.8rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 1rem;
            margin-bottom: 0.2rem;
        }

        .museum-location span {
            display: flex;
            align-items: center;
            gap: 0.3rem;
        }

        .museum-location i {
            color: var(--secondary);
            font-size: 0.7rem;
            width: 14px;
        }

        .museum-stats {
            font-size: 0.75rem;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            gap: 1rem;
        }

        .museum-stats i {
            color: var(--secondary);
            margin-right: 0.2rem;
        }

        .museum-arrow {
            color: var(--primary);
            opacity: 0.3;
            transition: all 0.2s;
            flex-shrink: 0;
        }

        .museum-card:hover .museum-arrow {
            opacity: 1;
            transform: translateX(3px);
        }

        /* ===== ÉTATS ===== */
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: var(--text-light);
        }

        .empty-state i {
            font-size: 3rem;
            color: var(--secondary);
            margin-bottom: 1rem;
        }

        .loading {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
        }

        .loading i {
            margin-right: 0.5rem;
            color: var(--primary);
        }

        .btn-reset {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.5rem 1.2rem;
            color: var(--text-light);
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.9rem;
        }

        .btn-reset:hover {
            background: var(--secondary);
            color: var(--primary);
            border-color: var(--primary);
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="museum-container">
        <!-- HEADER -->
        <div class="museum-header">
            <h1>
                <i class="fas fa-landmark"></i>
                Explorer les musées
            </h1>
            <div class="museum-stats" id="global-stats">
                Chargement...
            </div>
        </div>

        <!-- PAYS -->
        <h2 class="section-title">
            <i class="fas fa-globe"></i>
            Pays
        </h2>
        <div id="countries-container" class="countries-grid">
            <div class="loading">
                <i class="fas fa-spinner fa-spin"></i> Chargement des pays...
            </div>
        </div>

        <!-- VILLES -->
        <div id="cities-wrapper" style="display: none;">
            <h2 class="section-title">
                <i class="fas fa-city"></i>
                Villes en <span id="selected-country"></span>
            </h2>
            <div class="cities-section">
                <div class="cities-header">
                    <h3>
                        <i class="fas fa-map-marker-alt"></i>
                        Choisissez une ville
                    </h3>
                    <button class="btn-reset" onclick="resetCity()" id="reset-city-btn" style="display: none;">
                        <i class="fas fa-times"></i> Effacer la ville
                    </button>
                </div>
                <div id="cities-container" class="cities-grid">
                    <!-- Villes chargées dynamiquement -->
                </div>
            </div>
        </div>

        <!-- MUSÉES -->
        <h2 class="section-title">
            <i class="fas fa-landmark"></i>
            <span id="museums-title">Musées</span>
        </h2>
        <div class="museums-section">
            <div class="museums-header">
                <h3 id="museums-subtitle">
                    <i class="fas fa-landmark"></i>
                    Tous les musées
                </h3>
                <span class="museums-count" id="museums-count">0</span>
            </div>
            <div id="museums-container" class="museums-grid">
                <!-- Musées chargés dynamiquement -->
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script>
        // ===== CONFIGURATION =====
        const currentLang = '{{ session.get("language", "fr") }}';
        let allMuseums = [];
        let countriesData = [];
        let citiesData = [];
        let currentCountry = '';
        let currentCity = '';

        // ===== CHARGEMENT INITIAL =====
        document.addEventListener('DOMContentLoaded', function() {
            loadCountries();
            loadMuseums();
        });

        // ===== CHARGER LES PAYS =====
        async function loadCountries() {
            try {
                const response = await fetch(`/api/museums/countries?lang=${currentLang}`);
                countriesData = await response.json();
                
                // Trier par nom
                countriesData.sort((a, b) => a.name.localeCompare(b.name));
                
                // Afficher seulement les 8 premiers pays, le reste dans "Voir plus"
                const container = document.getElementById('countries-container');
                
                // Afficher les 8 premiers
                let html = countriesData.slice(0, 8).map(country => `
                    <div class="country-card ${currentCountry === country.name ? 'active' : ''}" 
                         onclick="selectCountry('${country.name.replace(/'/g, "\\'")}')">
                        <div class="country-name">
                            <i class="fas fa-flag"></i>
                            ${country.name}
                        </div>
                        <span class="country-count">${country.count}</span>
                    </div>
                `).join('');
                
                // Si plus de 8 pays, ajouter "Voir plus"
                if (countriesData.length > 8) {
                    html += `
                        <div class="country-card" onclick="showAllCountries()" style="background: var(--secondary);">
                            <div class="country-name">
                                <i class="fas fa-ellipsis-h"></i>
                                Voir les ${countriesData.length - 8} autres pays...
                            </div>
                        </div>
                    `;
                }
                
                container.innerHTML = html;
                
                // Mettre à jour les stats globales
                const totalMuseums = allMuseums.length;
                document.getElementById('global-stats').innerHTML = `
                    <i class="fas fa-landmark me-2"></i>${totalMuseums} musées · 
                    <i class="fas fa-globe me-2"></i>${countriesData.length} pays
                `;
                
            } catch (error) {
                console.error('Erreur chargement pays:', error);
            }
        }

        // ===== VOIR TOUS LES PAYS =====
        function showAllCountries() {
            const container = document.getElementById('countries-container');
            
            container.innerHTML = countriesData.map(country => `
                <div class="country-card ${currentCountry === country.name ? 'active' : ''}" 
                     onclick="selectCountry('${country.name.replace(/'/g, "\\'")}')">
                    <div class="country-name">
                        <i class="fas fa-flag"></i>
                        ${country.name}
                    </div>
                    <span class="country-count">${country.count}</span>
                </div>
            `).join('');
        }

        // ===== SÉLECTIONNER UN PAYS =====
        async function selectCountry(countryName) {
            currentCountry = countryName;
            currentCity = '';
            
            // Mettre à jour l'affichage des pays
            document.querySelectorAll('.country-card').forEach(card => {
                if (card.textContent.includes(countryName)) {
                    card.classList.add('active');
                } else {
                    card.classList.remove('active');
                }
            });
            
            // Charger les villes
            await loadCities(countryName);
            
            // Filtrer les musées
            filterMuseums();
            
            // Afficher la section villes
            document.getElementById('cities-wrapper').style.display = 'block';
            document.getElementById('selected-country').textContent = countryName;
        }

        // ===== CHARGER LES VILLES =====
        async function loadCities(countryName) {
            try {
                const response = await fetch(`/api/museums/cities?country=${encodeURIComponent(countryName)}&lang=${currentLang}`);
                citiesData = await response.json();
                
                const container = document.getElementById('cities-container');
                
                if (citiesData.length === 0) {
                    container.innerHTML = '<div class="empty-state">Aucune ville trouvée</div>';
                    return;
                }
                
                container.innerHTML = citiesData.map(city => `
                    <div class="city-item" onclick="selectCity('${city.name.replace(/'/g, "\\'")}')">
                        <span>
                            <i class="fas fa-map-marker-alt"></i>
                            ${city.name}
                        </span>
                        <span class="city-count">${city.museum_count}</span>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Erreur chargement villes:', error);
            }
        }

        // ===== SÉLECTIONNER UNE VILLE =====
        function selectCity(cityName) {
            currentCity = currentCity === cityName ? '' : cityName;
            
            // Mettre à jour l'affichage des villes
            document.querySelectorAll('.city-item').forEach(item => {
                if (item.textContent.includes(cityName)) {
                    item.classList.toggle('active', currentCity === cityName);
                } else {
                    item.classList.remove('active');
                }
            });
            
            // Afficher/masquer le bouton reset ville
            document.getElementById('reset-city-btn').style.display = currentCity ? 'block' : 'none';
            
            filterMuseums();
        }

        // ===== RÉINITIALISER LA VILLE =====
        function resetCity() {
            currentCity = '';
            document.querySelectorAll('.city-item').forEach(item => {
                item.classList.remove('active');
            });
            document.getElementById('reset-city-btn').style.display = 'none';
            filterMuseums();
        }

        // ===== CHARGER LES MUSÉES =====
        async function loadMuseums() {
            try {
                const response = await fetch(`/api/museums/list?lang=${currentLang}`);
                allMuseums = await response.json();
                displayMuseums(allMuseums);
                
                document.getElementById('museums-count').textContent = 
                    `${allMuseums.length} musée${allMuseums.length > 1 ? 's' : ''}`;
                
            } catch (error) {
                console.error('Erreur chargement musées:', error);
            }
        }

        // ===== FILTRER LES MUSÉES =====
        function filterMuseums() {
            let filtered = allMuseums;
            
            if (currentCountry) {
                filtered = filtered.filter(m => m.pays === currentCountry);
            }
            
            if (currentCity) {
                filtered = filtered.filter(m => m.ville === currentCity);
            }
            
            displayMuseums(filtered);
            
            // Mettre à jour les titres
            const title = document.getElementById('museums-title');
            const subtitle = document.getElementById('museums-subtitle');
            
            if (currentCity) {
                title.textContent = `Musées à ${currentCity}`;
                subtitle.innerHTML = `<i class="fas fa-landmark"></i> ${filtered.length} musée${filtered.length > 1 ? 's' : ''}`;
            } else if (currentCountry) {
                title.textContent = `Musées en ${currentCountry}`;
                subtitle.innerHTML = `<i class="fas fa-landmark"></i> ${filtered.length} musée${filtered.length > 1 ? 's' : ''}`;
            } else {
                title.textContent = 'Musées';
                subtitle.innerHTML = `<i class="fas fa-landmark"></i> Tous les musées`;
            }
            
            document.getElementById('museums-count').textContent = 
                `${filtered.length} musée${filtered.length > 1 ? 's' : ''}`;
        }

        // ===== AFFICHER LES MUSÉES =====
        function displayMuseums(museums) {
            const container = document.getElementById('museums-container');
            
            if (museums.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-landmark"></i>
                        <h4>Aucun musée trouvé</h4>
                        <p>Essayez de modifier vos filtres</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = museums.map(museum => `
                <div class="museum-card" onclick="handleMuseumClick(event, '${museum.id}', '${museum.nom.replace(/'/g, "\\'")}')">
                    <div class="museum-icon">
                        <i class="fas fa-museum"></i>
                    </div>
                    <div class="museum-content">
                        <div class="museum-name">${museum.nom || 'Musée inconnu'}</div>
                        <div class="museum-location">
                            <span><i class="fas fa-map-marker-alt"></i> ${museum.ville || '?'}</span>
                            <span><i class="fas fa-globe"></i> ${museum.pays || '?'}</span>
                        </div>
                        <div class="museum-stats">
                            <span><i class="fas fa-painting"></i> ${museum.oeuvres_count || 0} œuvres</span>
                        </div>
                    </div>
                    <div class="museum-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            `).join('');
        }

        // ===== GESTIONNAIRE DE CLIC SUR MUSÉE (AVEC CTRL) =====
        function handleMuseumClick(event, museumId, museumName) {
            event.preventDefault();
            
            const url = `/?museum=${encodeURIComponent(museumName)}`;
            
            if (event.ctrlKey || event.metaKey) {
                // Ctrl+Click : ouvrir dans un nouvel onglet
                window.open(url, '_blank');
            } else {
                // Click normal : navigation normale
                window.location.href = url;
            }
        }
    </script>
</body>
</html>
