<!-- register_modal.html -->
<div class="modal fade" id="registerModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
            <div class="modal-header">
                <h5 class="modal-title">Créer un compte</h5>
                <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
            </div>
            <div class="modal-body">
                <form method="POST" action="/register" id="register-form">
                    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
                    
                    <div class="mb-3">
                        <label for="modal-username" class="form-label">Nom d'utilisateur</label>
                        <input type="text" class="form-control" id="modal-username" name="username" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="modal-email" class="form-label">Email</label>
                        <input type="email" class="form-control" id="modal-email" name="email" required>
                    </div>
                    
                    <div class="mb-3">
                        <label for="modal-password" class="form-label">Mot de passe</label>
                        <input type="password" class="form-control" id="modal-password" name="password" required>
                        <ul class="password-requirements" id="modal-password-requirements" style="font-size: 0.75rem; list-style: none; padding-left: 0; margin-top: 0.5rem;">
                            <li id="modal-req-length" class="invalid">✓ 8 caractères minimum</li>
                            <li id="modal-req-uppercase" class="invalid">✓ Une majuscule</li>
                            <li id="modal-req-lowercase" class="invalid">✓ Une minuscule</li>
                            <li id="modal-req-number" class="invalid">✓ Un chiffre</li>
                        </ul>
                    </div>
                    
                    <button type="submit" class="btn-register" style="width: 100%; background: #2c3e50; color: #e6d8c3; border: none; border-radius: 8px; padding: 0.75rem; font-weight: 500;">
                        S'inscrire
                    </button>
                </form>
                
                <div class="login-link text-center mt-3" style="font-size: 0.85rem;">
                    Déjà un compte ? <a href="#" onclick="switchToLoginModal(); return false;">Se connecter</a>
                </div>
            </div>
        </div>
    </div>
</div>

<style>
.password-requirements li {
    color: #dc3545;
    font-size: 0.75rem;
    margin-bottom: 0.2rem;
    transition: color 0.2s;
}

.password-requirements li.valid {
    color: #28a745;
}

.password-requirements li.invalid {
    color: #dc3545;
}
</style>

<script>
// Validation en temps réel du mot de passe
document.getElementById('modal-password')?.addEventListener('input', function(e) {
    const password = e.target.value;
    
    // Longueur
    const lengthReq = document.getElementById('modal-req-length');
    if (password.length >= 8) {
        lengthReq.classList.add('valid');
        lengthReq.classList.remove('invalid');
    } else {
        lengthReq.classList.add('invalid');
        lengthReq.classList.remove('valid');
    }
    
    // Majuscule
    const upperReq = document.getElementById('modal-req-uppercase');
    if (/[A-Z]/.test(password)) {
        upperReq.classList.add('valid');
        upperReq.classList.remove('invalid');
    } else {
        upperReq.classList.add('invalid');
        upperReq.classList.remove('valid');
    }
    
    // Minuscule
    const lowerReq = document.getElementById('modal-req-lowercase');
    if (/[a-z]/.test(password)) {
        lowerReq.classList.add('valid');
        lowerReq.classList.remove('invalid');
    } else {
        lowerReq.classList.add('invalid');
        lowerReq.classList.remove('valid');
    }
    
    // Chiffre
    const numberReq = document.getElementById('modal-req-number');
    if (/[0-9]/.test(password)) {
        numberReq.classList.add('valid');
        numberReq.classList.remove('invalid');
    } else {
        numberReq.classList.add('invalid');
        numberReq.classList.remove('valid');
    }
});
</script>
