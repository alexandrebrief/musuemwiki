<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Surprise - MuseumWiki</title>
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f0e8;
            color: #2c3e50;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
            overflow-x: hidden;
        }

        /* Éléments décoratifs */
        .decor-circle {
            position: absolute;
            border-radius: 50%;
            background: #e6d8c3;
            opacity: 0.3;
            z-index: 0;
        }

        .circle-1 {
            width: 300px;
            height: 300px;
            top: -150px;
            left: -150px;
        }

        .circle-2 {
            width: 200px;
            height: 200px;
            bottom: -100px;
            right: -100px;
            background: #d4c9b9;
        }

        .circle-3 {
            width: 150px;
            height: 150px;
            bottom: 20%;
            left: 5%;
            background: #c5b9a8;
        }

        /* Pinceaux stylisés */
        .brush-stroke {
            position: absolute;
            width: 100%;
            height: 2px;
            background: linear-gradient(90deg, transparent, #2c3e50, transparent);
            opacity: 0.1;
            transform: rotate(-5deg);
        }

        .stroke-1 { top: 20%; }
        .stroke-2 { bottom: 30%; transform: rotate(3deg); }

        /* Carte principale */
        .surprise-card {
            background: white;
            border-radius: 16px;
            padding: 3rem 4rem;
            box-shadow: 0 20px 40px rgba(44, 62, 80, 0.1);
            border: 1px solid #e0d6c8;
            text-align: center;
            max-width: 600px;
            z-index: 10;
            position: relative;
            animation: fadeIn 0.8s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h1 {
            font-family: 'Playfair Display', serif;
            font-size: 2.8rem;
            font-weight: 500;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            letter-spacing: -0.02em;
        }

        .subtitle {
            color: #5d6d7e;
            font-size: 1rem;
            margin-bottom: 2.5rem;
            padding-bottom: 1.5rem;
            border-bottom: 1px solid #f0e8dc;
        }

        /* Mini galerie */
        .mini-gallery {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 0.8rem;
            margin: 2rem 0;
        }

        .gallery-item {
            aspect-ratio: 1/1;
            background: #f5f0e8;
            border-radius: 8px;
            border: 1px solid #e0d6c8;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #8e9aab;
            font-size: 0.8rem;
            transition: all 0.2s;
        }

        .gallery-item:hover {
            background: #e6d8c3;
            color: #2c3e50;
            transform: translateY(-2px);
        }

        /* Stats élégantes */
        .stats-grid {
            display: flex;
            justify-content: space-around;
            gap: 1.5rem;
            margin: 2rem 0;
            padding: 1.5rem;
            background: #f5f0e8;
            border-radius: 12px;
            border: 1px solid #e0d6c8;
        }

        .stat-item {
            text-align: center;
            flex: 1;
        }

        .stat-number {
            font-family: 'Playfair Display', serif;
            font-size: 2.2rem;
            font-weight: 600;
            color: #2c3e50;
            line-height: 1;
            margin-bottom: 0.3rem;
        }

        .stat-label {
            font-size: 0.75rem;
            color: #5d6d7e;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        /* Citation */
        .quote-block {
            margin: 2rem 0;
            padding: 1.5rem;
            border-left: 3px solid #2c3e50;
            background: #faf7f2;
            text-align: left;
        }

        .quote-text {
            font-family: 'Playfair Display', serif;
            font-size: 1.1rem;
            font-style: italic;
            color: #2c3e50;
            margin-bottom: 0.5rem;
            line-height: 1.6;
        }

        .quote-author {
            color: #8e9aab;
            font-size: 0.85rem;
            text-align: right;
        }

        /* Fun fact */
        .fact-card {
            background: white;
            border: 1px solid #e0d6c8;
            border-radius: 50px;
            padding: 1rem 1.5rem;
            margin: 2rem 0;
            color: #2c3e50;
            font-size: 0.9rem;
            box-shadow: 0 2px 8px rgba(44,62,80,0.05);
            transition: all 0.3s;
        }

        .fact-card:hover {
            box-shadow: 0 4px 12px rgba(44,62,80,0.1);
        }

        /* Boutons */
        .button-group {
            display: flex;
            gap: 1rem;
            justify-content: center;
            margin: 2rem 0 1rem;
        }

        .btn {
            padding: 0.7rem 1.8rem;
            border-radius: 30px;
            text-decoration: none;
            font-size: 0.9rem;
            font-weight: 500;
            transition: all 0.2s;
            border: 1px solid transparent;
            cursor: pointer;
            background: transparent;
            font-family: 'Inter', sans-serif;
        }

        .btn-primary {
            background: #2c3e50;
            color: #e6d8c3;
            border-color: #2c3e50;
        }

        .btn-primary:hover {
            background: #1a252f;
            transform: translateY(-2px);
            box-shadow: 0 4px 12px rgba(44,62,80,0.2);
        }

        .btn-secondary {
            background: transparent;
            color: #2c3e50;
            border-color: #d4c9b9;
        }

        .btn-secondary:hover {
            background: #f5f0e8;
            transform: translateY(-2px);
        }

        .btn-outline {
            border: none;
            color: #8e9aab;
            font-size: 0.8rem;
            padding: 0.5rem 1rem;
        }

        .btn-outline:hover {
            color: #2c3e50;
            background: #f5f0e8;
        }

        /* Palette de couleurs */
        .color-strip {
            display: flex;
            height: 4px;
            width: 100%;
            margin: 1.5rem 0;
        }

        .color-segment {
            flex: 1;
            height: 100%;
        }

        .segment-1 { background: #2c3e50; }
        .segment-2 { background: #5d6d7e; }
        .segment-3 { background: #8e9aab; }
        .segment-4 { background: #e6d8c3; }
        .segment-5 { background: #d4c9b9; }

        /* Message secret */
        .secret-trigger {
            margin-top: 2rem;
            font-size: 0.7rem;
            color: #c5b9a8;
            cursor: pointer;
            transition: color 0.2s;
            letter-spacing: 1px;
        }

        .secret-trigger:hover {
            color: #2c3e50;
        }
    </style>
</head>
<body>
    <!-- Éléments décoratifs -->
    <div class="decor-circle circle-1"></div>
    <div class="decor-circle circle-2"></div>
    <div class="decor-circle circle-3"></div>
    <div class="brush-stroke stroke-1"></div>
    <div class="brush-stroke stroke-2"></div>

    <div class="surprise-card">
        <h1>Surprise</h1>
        <div class="subtitle">Un coin secret dans MuseumWiki</div>

        <!-- Mini galerie d'icônes -->
        <div class="mini-gallery">
            <div class="gallery-item">🎨</div>
            <div class="gallery-item">🖼️</div>
            <div class="gallery-item">🖌️</div>
            <div class="gallery-item">🏛️</div>
            <div class="gallery-item">📷</div>
            <div class="gallery-item">✏️</div>
        </div>

        <!-- Stats basées sur de vraies données (à remplacer par tes vraies stats) -->
        <div class="stats-grid">
            <div class="stat-item">
                <div class="stat-number">7,432</div>
                <div class="stat-label">Œuvres</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">2,891</div>
                <div class="stat-label">Artistes</div>
            </div>
            <div class="stat-item">
                <div class="stat-number">342</div>
                <div class="stat-label">Musées</div>
            </div>
        </div>

        <!-- Citation -->
        <div class="quote-block">
            <div class="quote-text">
                "L'art est le plus court chemin de l'homme à l'homme."
            </div>
            <div class="quote-author">— André Malraux</div>
        </div>

        <!-- Fun fact qui change -->
        <div class="fact-card" id="factDisplay">
            Le saviez-vous ? La première photographie a été prise en 1826.
        </div>

        <!-- Boutons -->
        <div class="button-group">
            <a href="/" class="btn btn-primary">← Accueil</a>
            <button class="btn btn-secondary" onclick="newFact()">Nouveau fait</button>
        </div>

        <!-- Bande de couleurs -->
        <div class="color-strip">
            <div class="color-segment segment-1"></div>
            <div class="color-segment segment-2"></div>
            <div class="color-segment segment-3"></div>
            <div class="color-segment segment-4"></div>
            <div class="color-segment segment-5"></div>
        </div>

        <!-- Message secret -->
        <div class="secret-trigger" onclick="revealSecret()">
            ● ● ●
        </div>
    </div>

    <script>
        // Base de faits artistiques
        const facts = [
            "Le Louvre a accueilli plus de 10 millions de visiteurs en 2023.",
            "Van Gogh n'a vendu qu'un seul tableau de son vivant.",
            "La Joconde n'a pas de sourcils, c'était la mode à la Renaissance.",
            "Le tableau le plus cher du monde a été vendu 450 millions de dollars.",
            "Il existe 7 versions de la Joconde dans le monde.",
            "Michel-Ange a commencé la Chapelle Sixtine à 33 ans.",
            "Le musée le plus visité au monde est le Louvre.",
            "La première photographie a nécessité 8 heures de pose."
        ];

        // Statistiques réelles (à remplacer par tes vraies données)
        const realStats = {
            oeuvres: 7432,
            artistes: 2891,
            musees: 342
        };

        function newFact() {
            const factElement = document.getElementById('factDisplay');
            const randomIndex = Math.floor(Math.random() * facts.length);
            factElement.textContent = facts[randomIndex];
            
            // Petite animation
            factElement.style.transform = 'scale(1.02)';
            setTimeout(() => {
                factElement.style.transform = 'scale(1)';
            }, 200);
        }

        function revealSecret() {
            // Change les stats pour montrer des chiffres rigolos
            const stats = document.querySelectorAll('.stat-number');
            stats[0].textContent = '∞';
            stats[1].textContent = '42';
            stats[2].textContent = '7';
            
            // Change la citation
            document.querySelector('.quote-text').innerHTML = 
                '"Tout le monde est un génie. Mais si vous jugez un poisson sur sa capacité à grimper à un arbre, il passera sa vie à croire qu\'il est stupide."';
            document.querySelector('.quote-author').textContent = '— Albert Einstein (selon Internet)';
            
            // Animation discrète
            alert('🤫 Chut... secret révélé !');
        }

        // Changer le fait toutes les 15 secondes
        setInterval(newFact, 15000);
    </script>
</body>
</html>
