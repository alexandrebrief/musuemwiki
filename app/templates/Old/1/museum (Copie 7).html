<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Explorer les musées - {{ site_name }}</title>
    
    <!-- Styles -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    
    <style>
        /* ===== VARIABLES ===== */
        :root {
            --primary: #2c3e50;
            --primary-light: #3a4a5a;
            --secondary: #e6d8c3;
            --background: #f5f0e8;
            --surface: #ffffff;
            --text: #2c3e50;
            --text-light: #5d6d7e;
            --text-soft: #8e9aab;
            --border: #e0d6c8;
            --border-light: #f0e8dc;
            --shadow: 0 2px 8px rgba(44,62,80,0.03);
            --shadow-hover: 0 4px 12px rgba(44,62,80,0.05);
            --radius: 12px;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--background);
            color: var(--text);
            line-height: 1.5;
        }

        h1, h2, h3, h4 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: var(--primary);
        }

        /* ===== CONTAINER ===== */
        .museum-container {
            max-width: 1200px;
            margin: 2rem auto;
            padding: 0 1.5rem;
        }

        /* ===== HEADER ===== */
        .museum-header {
            margin-bottom: 2rem;
            text-align: center;
        }

        .museum-header h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.8rem;
        }

        .museum-header h1 i {
            color: var(--primary);
            background: var(--secondary);
            padding: 0.7rem;
            border-radius: 50%;
            font-size: 1.2rem;
        }

        .global-stats {
            color: var(--text-light);
            font-size: 0.9rem;
            display: flex;
            justify-content: center;
            gap: 2rem;
        }

        /* ===== BARRE DE RECHERCHE ===== */
        .search-card {
            background: var(--surface);
            border-radius: 60px;
            padding: 0.2rem 0.2rem 0.2rem 1.5rem;
            box-shadow: var(--shadow);
            border: 1px solid var(--border-light);
            margin-bottom: 1rem;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
            display: flex;
            align-items: center;
        }

        .search-icon {
            color: var(--text-soft);
            font-size: 0.85rem;
            margin-right: 0.5rem;
        }

        .search-input {
            flex: 1;
            border: none;
            padding: 0.7rem 0;
            font-size: 0.9rem;
            background: transparent;
            color: var(--text);
        }

        .search-input:focus {
            outline: none;
        }

        .search-input::placeholder {
            color: var(--text-soft);
        }

        .search-reset {
            background: var(--background);
            border: none;
            color: var(--text-light);
            padding: 0.4rem 1rem;
            border-radius: 40px;
            cursor: pointer;
            font-size: 0.8rem;
            display: flex;
            align-items: center;
            gap: 0.3rem;
            transition: all 0.2s;
        }

        .search-reset:hover {
            background: var(--secondary);
            color: var(--primary);
        }

        /* ===== SUGGESTIONS PAYS ===== */
        .suggestions-container {
            position: relative;
            max-width: 600px;
            margin: 0 auto 2rem auto;
        }

        .suggestions-list {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border);
            box-shadow: var(--shadow-hover);
            max-height: 350px;
            overflow-y: auto;
            z-index: 1000;
            display: none;
        }

        .suggestion-item {
            padding: 0.7rem 1rem;
            cursor: pointer;
            border-bottom: 1px solid var(--border-light);
            display: flex;
            justify-content: space-between;
            align-items: center;
            transition: background 0.2s;
            font-size: 0.85rem;
        }

        .suggestion-item:hover {
            background: var(--background);
        }

        .suggestion-item.selected {
            background: var(--secondary);
        }

        .suggestion-name {
            font-weight: 500;
            color: var(--text);
            display: flex;
            align-items: center;
            gap: 0.6rem;
        }

        .suggestion-name i {
            color: var(--primary);
            width: 16px;
            font-size: 0.8rem;
        }

        .suggestion-stats {
            display: flex;
            gap: 0.8rem;
            font-size: 0.75rem;
            color: var(--text-light);
        }

        .suggestion-stats span {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .suggestion-stats i {
            color: var(--secondary);
            font-size: 0.7rem;
        }

        /* ===== VILLES ===== */
        .cities-section {
            background: var(--surface);
            border-radius: var(--radius);
            padding: 1.2rem;
            margin-bottom: 2rem;
            border: 1px solid var(--border-light);
            box-shadow: var(--shadow);
        }

        .cities-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
            font-size: 0.9rem;
        }

        .cities-header h3 {
            font-size: 1rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .cities-header h3 i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .selected-country-badge {
            background: var(--secondary);
            color: var(--primary);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .btn-reset-small {
            background: transparent;
            border: 1px solid var(--border);
            border-radius: 30px;
            padding: 0.3rem 0.8rem;
            color: var(--text-light);
            cursor: pointer;
            font-size: 0.75rem;
            display: flex;
            align-items: center;
            gap: 0.2rem;
            transition: all 0.2s;
        }

        .btn-reset-small:hover {
            background: var(--background);
            border-color: var(--text-light);
        }

        .cities-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 0.6rem;
        }

        .city-chip {
            background: var(--background);
            border: 1px solid var(--border-light);
            border-radius: 40px;
            padding: 0.4rem 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: space-between;
            font-size: 0.8rem;
        }

        .city-chip:hover {
            background: var(--secondary);
            border-color: var(--primary);
            transform: translateY(-1px);
        }

        .city-chip.active {
            background: var(--primary);
            color: white;
            border-color: var(--primary);
        }

        .city-chip.active i {
            color: white;
        }

        .city-chip i {
            color: var(--primary);
            margin-right: 0.3rem;
            font-size: 0.7rem;
        }

        .city-stats {
            display: flex;
            gap: 0.4rem;
            font-size: 0.7rem;
        }

        .city-stats span {
            background: var(--surface);
            padding: 0.1rem 0.4rem;
            border-radius: 20px;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.1rem;
        }

        .city-chip.active .city-stats span {
            background: rgba(255,255,255,0.2);
            color: white;
        }

        .city-stats i {
            font-size: 0.6rem;
            margin-right: 0.1rem;
        }

        /* ===== MUSÉES ===== */
        .museums-section {
            margin-top: 1.5rem;
        }

        .museums-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 1rem;
        }

        .museums-header h3 {
            font-size: 1rem;
            margin: 0;
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .museums-header h3 i {
            color: var(--primary);
            font-size: 0.9rem;
        }

        .museums-count {
            background: var(--secondary);
            color: var(--primary);
            padding: 0.2rem 0.8rem;
            border-radius: 30px;
            font-size: 0.8rem;
            font-weight: 500;
        }

        .museums-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
            gap: 0.8rem;
        }

        .museum-card {
            background: var(--surface);
            border: 1px solid var(--border-light);
            border-radius: var(--radius);
            padding: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 0.8rem;
            text-decoration: none;
            color: inherit;
            box-shadow: var(--shadow);
        }

        .museum-card:hover {
            transform: translateY(-2px);
            border-color: var(--secondary);
            box-shadow: var(--shadow-hover);
        }

        .museum-icon {
            width: 40px;
            height: 40px;
            background: var(--background);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 1rem;
            flex-shrink: 0;
        }

        .museum-info {
            flex: 1;
            min-width: 0;
        }

        .museum-name {
            font-weight: 500;
            color: var(--primary);
            margin-bottom: 0.2rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
            font-size: 0.85rem;
        }

        .museum-location {
            font-size: 0.7rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 0.8rem;
            margin-bottom: 0.1rem;
        }

        .museum-location span {
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .museum-location i {
            color: var(--secondary);
            font-size: 0.65rem;
        }

        .museum-works {
            font-size: 0.65rem;
            color: var(--text-soft);
            display: flex;
            align-items: center;
            gap: 0.2rem;
        }

        .museum-works i {
            color: var(--secondary);
            font-size: 0.6rem;
        }

        .museum-arrow {
            color: var(--secondary);
            opacity: 0.3;
            transition: all 0.2s;
            font-size: 0.7rem;
        }

        .museum-card:hover .museum-arrow {
            opacity: 1;
            transform: translateX(3px);
        }

        /* ===== BOUTON VOIR PLUS ===== */
        .view-more-container {
            text-align: center;
            margin: 1.5rem 0;
        }

        .btn-view-more {
            background: transparent;
            border: 2px solid var(--secondary);
            border-radius: 40px;
            padding: 0.6rem 2rem;
            color: var(--primary);
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 0.6rem;
            font-size: 0.85rem;
        }

        .btn-view-more:hover {
            background: var(--secondary);
            transform: translateY(-2px);
        }

        /* ===== ÉTATS ===== */
        .empty-state {
            text-align: center;
            padding: 2rem;
            color: var(--text-light);
            background: var(--surface);
            border-radius: var(--radius);
            border: 1px solid var(--border-light);
            font-size: 0.85rem;
        }

        .empty-state i {
            font-size: 2rem;
            color: var(--secondary);
            margin-bottom: 0.5rem;
        }

        .loading {
            text-align: center;
            padding: 1.5rem;
            color: var(--text-light);
            font-size: 0.85rem;
        }

        .loading i {
            margin-right: 0.3rem;
            color: var(--primary);
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="museum-container">
        <!-- HEADER -->
        <div class="museum-header">
            <h1>
                <i class="fas fa-landmark"></i>
                Musées
            </h1>
            <div class="global-stats" id="global-stats">
                <span><i class="fas fa-spinner fa-spin"></i> Chargement...</span>
            </div>
        </div>

        <!-- BARRE DE RECHERCHE -->
        <div class="search-card">
            <i class="fas fa-search search-icon"></i>
            <input type="text" id="country-search" class="search-input" 
                   placeholder="Rechercher un pays..." 
                   autocomplete="off">
            <button class="search-reset" onclick="resetSearch()" id="reset-search" style="display: none;">
                <i class="fas fa-times"></i>
            </button>
        </div>

        <!-- SUGGESTIONS PAYS -->
        <div class="suggestions-container">
            <div id="suggestions-list" class="suggestions-list"></div>
        </div>

        <!-- VILLES -->
        <div id="cities-wrapper" style="display: none;">
            <div class="cities-section">
                <div class="cities-header">
                    <h3>
                        <i class="fas fa-city"></i>
                        Villes
                    </h3>
                    <span class="selected-country-badge" id="selected-country-name"></span>
                    <button class="btn-reset-small" onclick="resetCountry()" id="reset-country-btn">
                        <i class="fas fa-times"></i> Changer
                    </button>
                </div>
                <div id="cities-container" class="cities-grid">
                    <!-- Villes chargées dynamiquement -->
                </div>
            </div>
        </div>

        <!-- MUSÉES -->
        <div class="museums-section">
            <div class="museums-header">
                <h3 id="museums-title">
                    <i class="fas fa-landmark"></i>
                    Musées
                </h3>
                <span class="museums-count" id="museums-count">0</span>
            </div>
            
            <div id="museums-container" class="museums-grid">
                <div class="loading">
                    <i class="fas fa-spinner fa-spin"></i> Chargement...
                </div>
            </div>
            
            <div id="view-more-container" class="view-more-container" style="display: none;">
                <button class="btn-view-more" onclick="loadMoreMuseums()">
                    <i class="fas fa-plus-circle"></i> Voir plus
                </button>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script>
        // ===== CONFIGURATION =====
        const currentLang = '{{ session.get("language", "fr") }}';
        let allCountries = [];
        let allMuseums = [];
        let filteredMuseums = [];
        let citiesData = [];
        let currentCountry = '';
        let currentCity = '';
        let museumsOffset = 8;
        let museumsPerPage = 8;

        // ===== CHARGEMENT INITIAL =====
        document.addEventListener('DOMContentLoaded', function() {
            loadCountries();
            loadMuseums();
            
            // Au clic dans la recherche, afficher tous les pays
            document.getElementById('country-search').addEventListener('focus', function() {
                if (this.value === '') {
                    displaySuggestions(allCountries.slice(0, 15));
                }
            });
        });

        // ===== CHARGER LES PAYS =====
        async function loadCountries() {
            try {
                const response = await fetch(`/api/museums/countries?lang=${currentLang}`);
                allCountries = await response.json();
                allCountries.sort((a, b) => a.name.localeCompare(b.name));
            } catch (error) {
                console.error('Erreur chargement pays:', error);
            }
        }

        // ===== CHARGER LES MUSÉES =====
        async function loadMuseums() {
            try {
                const response = await fetch(`/api/museums/list?lang=${currentLang}`);
                allMuseums = await response.json();
                filteredMuseums = [...allMuseums];
                
                const totalMuseums = allMuseums.length;
                const totalWorks = allMuseums.reduce((sum, m) => sum + (m.oeuvres_count || 0), 0);
                
                document.getElementById('global-stats').innerHTML = `
                    <span><i class="fas fa-landmark"></i> ${totalMuseums} musées</span>
                    <span><i class="fas fa-painting"></i> ${totalWorks.toLocaleString()} œuvres</span>
                `;
                
                displayMuseums(filteredMuseums.slice(0, museumsPerPage));
                updateMuseumsCount();
                
                if (filteredMuseums.length > museumsPerPage) {
                    document.getElementById('view-more-container').style.display = 'block';
                }
                
            } catch (error) {
                console.error('Erreur chargement musées:', error);
            }
        }

        // ===== RECHERCHE PAYS =====
        document.getElementById('country-search').addEventListener('input', function(e) {
            const query = e.target.value.toLowerCase().trim();
            
            document.getElementById('reset-search').style.display = query ? 'block' : 'none';
            
            if (query === '') {
                displaySuggestions(allCountries.slice(0, 15));
                return;
            }
            
            if (query.length < 1) return;
            
            const filtered = allCountries.filter(country => 
                country.name.toLowerCase().includes(query)
            ).slice(0, 15);
            
            displaySuggestions(filtered);
        });

        // ===== AFFICHER SUGGESTIONS =====
        function displaySuggestions(countries) {
            const list = document.getElementById('suggestions-list');
            
            if (countries.length === 0) {
                list.style.display = 'none';
                return;
            }
            
            list.innerHTML = countries.map(country => `
                <div class="suggestion-item" onclick="selectCountry('${country.name.replace(/'/g, "\\'")}')">
                    <span class="suggestion-name">
                        <i class="fas fa-flag"></i>
                        ${country.name}
                    </span>
                    <span class="suggestion-stats">
                        <span><i class="fas fa-landmark"></i> ${country.museums}</span>
                        <span><i class="fas fa-painting"></i> ${country.works}</span>
                    </span>
                </div>
            `).join('');
            
            list.style.display = 'block';
        }

        // ===== SÉLECTIONNER PAYS =====
        async function selectCountry(countryName) {
            currentCountry = countryName;
            
            document.getElementById('suggestions-list').style.display = 'none';
            document.getElementById('country-search').value = countryName;
            document.getElementById('reset-search').style.display = 'block';
            
            await loadCities(countryName);
            filterMuseums();
            
            document.getElementById('cities-wrapper').style.display = 'block';
            document.getElementById('selected-country-name').textContent = countryName;
        }

        // ===== RÉINITIALISER PAYS =====
        function resetCountry() {
            currentCountry = '';
            currentCity = '';
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            document.getElementById('cities-wrapper').style.display = 'none';
            
            filteredMuseums = [...allMuseums];
            museumsOffset = 8;
            displayMuseums(filteredMuseums.slice(0, museumsPerPage));
            updateMuseumsCount();
            
            document.getElementById('museums-title').innerHTML = 
                `<i class="fas fa-landmark"></i> Musées`;
            
            if (filteredMuseums.length > museumsPerPage) {
                document.getElementById('view-more-container').style.display = 'block';
            }
        }

        // ===== RÉINITIALISER RECHERCHE =====
        function resetSearch() {
            document.getElementById('country-search').value = '';
            document.getElementById('reset-search').style.display = 'none';
            document.getElementById('suggestions-list').style.display = 'none';
        }

        // ===== CHARGER VILLES =====
        async function loadCities(countryName) {
            try {
                const response = await fetch(`/api/museums/cities?country=${encodeURIComponent(countryName)}&lang=${currentLang}`);
                citiesData = await response.json();
                
                const container = document.getElementById('cities-container');
                
                if (citiesData.length === 0) {
                    container.innerHTML = '<div class="empty-state">Aucune ville</div>';
                    return;
                }
                
                container.innerHTML = citiesData.slice(0, 12).map(city => `
                    <div class="city-chip" onclick="selectCity('${city.name.replace(/'/g, "\\'")}')">
                        <span>
                            <i class="fas fa-map-marker-alt"></i>
                            ${city.name}
                        </span>
                        <span class="city-stats">
                            <span><i class="fas fa-landmark"></i> ${city.museums}</span>
                            <span><i class="fas fa-painting"></i> ${city.works}</span>
                        </span>
                    </div>
                `).join('');
                
            } catch (error) {
                console.error('Erreur chargement villes:', error);
            }
        }

        // ===== SÉLECTIONNER VILLE =====
        function selectCity(cityName) {
            currentCity = currentCity === cityName ? '' : cityName;
            
            document.querySelectorAll('.city-chip').forEach(item => {
                if (item.textContent.includes(cityName)) {
                    item.classList.toggle('active', currentCity === cityName);
                } else {
                    item.classList.remove('active');
                }
            });
            
            filterMuseums();
        }

        // ===== FILTRER MUSÉES =====
        function filterMuseums() {
            let filtered = allMuseums;
            
            if (currentCountry) {
                filtered = filtered.filter(m => m.pays === currentCountry);
            }
            if (currentCity) {
                filtered = filtered.filter(m => m.ville === currentCity);
            }
            
            filteredMuseums = filtered;
            museumsOffset = 8;
            
            displayMuseums(filtered.slice(0, museumsPerPage));
            updateMuseumsCount();
            
            const title = document.getElementById('museums-title');
            if (currentCity) {
                title.innerHTML = `<i class="fas fa-landmark"></i> Musées à ${currentCity}`;
            } else if (currentCountry) {
                title.innerHTML = `<i class="fas fa-landmark"></i> Musées en ${currentCountry}`;
            } else {
                title.innerHTML = `<i class="fas fa-landmark"></i> Musées`;
            }
            
            const viewMore = document.getElementById('view-more-container');
            if (filtered.length > museumsPerPage) {
                viewMore.style.display = 'block';
            } else {
                viewMore.style.display = 'none';
            }
        }

        // ===== AFFICHER MUSÉES =====
        function displayMuseums(museums) {
            const container = document.getElementById('museums-container');
            
            if (museums.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <i class="fas fa-landmark"></i>
                        <p>Aucun musée trouvé</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = museums.map(museum => `
                <div class="museum-card" onclick="handleMuseumClick(event, '${museum.id}', '${museum.nom.replace(/'/g, "\\'")}')">
                    <div class="museum-icon">
                        <i class="fas fa-museum"></i>
                    </div>
                    <div class="museum-info">
                        <div class="museum-name">${museum.nom || 'Musée'}</div>
                        <div class="museum-location">
                            <span><i class="fas fa-map-marker-alt"></i> ${museum.ville || '?'}</span>
                            <span><i class="fas fa-globe"></i> ${museum.pays || '?'}</span>
                        </div>
                        <div class="museum-works">
                            <i class="fas fa-painting"></i> ${museum.oeuvres_count || 0} œuvres
                        </div>
                    </div>
                    <div class="museum-arrow">
                        <i class="fas fa-chevron-right"></i>
                    </div>
                </div>
            `).join('');
        }

        // ===== CHARGER PLUS =====
        function loadMoreMuseums() {
            const nextMuseums = filteredMuseums.slice(museumsOffset, museumsOffset + museumsPerPage);
            
            if (nextMuseums.length > 0) {
                const container = document.getElementById('museums-container');
                
                nextMuseums.forEach(museum => {
                    const div = document.createElement('div');
                    div.className = 'museum-card';
                    div.setAttribute('onclick', `handleMuseumClick(event, '${museum.id}', '${museum.nom.replace(/'/g, "\\'")}')`);
                    div.innerHTML = `
                        <div class="museum-icon">
                            <i class="fas fa-museum"></i>
                        </div>
                        <div class="museum-info">
                            <div class="museum-name">${museum.nom || 'Musée'}</div>
                            <div class="museum-location">
                                <span><i class="fas fa-map-marker-alt"></i> ${museum.ville || '?'}</span>
                                <span><i class="fas fa-globe"></i> ${museum.pays || '?'}</span>
                            </div>
                            <div class="museum-works">
                                <i class="fas fa-painting"></i> ${museum.oeuvres_count || 0} œuvres
                            </div>
                        </div>
                        <div class="museum-arrow">
                            <i class="fas fa-chevron-right"></i>
                        </div>
                    `;
                    container.appendChild(div);
                });
                
                museumsOffset += museumsPerPage;
                
                if (museumsOffset >= filteredMuseums.length) {
                    document.getElementById('view-more-container').style.display = 'none';
                }
            }
        }

        // ===== METTRE À JOUR COMPTEUR =====
        function updateMuseumsCount() {
            document.getElementById('museums-count').textContent = 
                `${filteredMuseums.length} musée${filteredMuseums.length > 1 ? 's' : ''}`;
        }

        // ===== CLIC MUSÉE =====
        function handleMuseumClick(event, museumId, museumName) {
            event.preventDefault();
            const url = `/?museum=${encodeURIComponent(museumName)}`;
            
            if (event.ctrlKey || event.metaKey) {
                window.open(url, '_blank');
            } else {
                window.location.href = url;
            }
        }

        // Fermer suggestions
        document.addEventListener('click', function(e) {
            if (!e.target.closest('.search-card') && !e.target.closest('.suggestions-list')) {
                document.getElementById('suggestions-list').style.display = 'none';
            }
        });
    </script>
</body>
</html>
