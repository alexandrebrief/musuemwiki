<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{{ site_name }} - Connexion</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        /* ===== STYLES GÉNÉRAUX ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f5f0e8;
            color: #2c3e50;
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }
        
        h1, h2, h3, h4, h5, h6 {
            font-family: 'Playfair Display', serif;
            font-weight: 500;
            color: #1e2b3a;
        }
        
        /* ===== STYLES SPÉCIFIQUES À LOGIN ===== */
        .hero-section {
            padding: 3rem 0 2rem;
            text-align: center;
            background: #f5f0e8;
        }
        
        .hero-title {
            font-size: 2.5rem;
            font-weight: 600;
            color: #2c3e50;
            margin-bottom: 0.5rem;
        }
        
        .login-container {
            max-width: 400px;
            margin: 2rem auto;
            flex: 1;
        }
        
        .login-card {
            background: white;
            border-radius: 16px;
            padding: 2.5rem;
            box-shadow: 0 4px 12px rgba(44,62,80,0.05);
        }
        
        .login-title {
            font-size: 1.5rem;
            margin-bottom: 2rem;
            text-align: center;
            color: #2c3e50;
        }
        
        .form-label {
            color: #2c3e50;
            font-weight: 500;
            margin-bottom: 0.5rem;
        }
        
        .form-control {
            border: 1px solid #e0d6c8;
            border-radius: 8px;
            padding: 0.75rem 1rem;
            font-family: 'Inter', sans-serif;
        }
        
        .form-control:focus {
            border-color: #2c3e50;
            box-shadow: 0 0 0 0.2rem rgba(44,62,80,0.1);
            outline: none;
        }
        /* Style pour le groupe d'entrée avec œil */
.password-input-group {
    position: relative;
    display: flex;
    align-items: center;
}

.password-input-group .form-control {
    padding-right: 2.5rem;
}

.password-toggle {
    position: absolute;
    right: 10px;
    background: transparent;
    border: none;
    color: #5d6d7e;
    cursor: pointer;
    padding: 0;
    font-size: 1.1rem;
    transition: color 0.2s;
    z-index: 10;
}

.password-toggle:hover {
    color: #2c3e50;
}

.password-toggle:focus {
    outline: none;
}
        /* Style spécifique pour le bouton du formulaire (pas celui de la navbar) */
        .btn-login-form {
            background: #2c3e50;
            color: #e6d8c3;
            border: none;
            border-radius: 8px;
            padding: 0.75rem;
            font-weight: 500;
            width: 100%;
            margin-top: 1rem;
            transition: all 0.2s;
        }
        
        .btn-login-form:hover {
            background: #1e2b3a;
            color: #e6d8c3;
        }
        
        .register-link {
            text-align: center;
            margin-top: 1.5rem;
            color: #5d6d7e;
        }
        
        .register-link a {
            color: #2c3e50;
            text-decoration: none;
            font-weight: 500;
        }
        
        .register-link a:hover {
            text-decoration: underline;
        }
        
        .alert {
            border-radius: 8px;
            margin-bottom: 1.5rem;
        }
        
        .alert-dismissible .btn-close {
            padding: 0.75rem;
        }
    </style>
</head>
<body>
    {% include 'navbar.html' %}

    <div class="hero-section">
        <div class="container">
            <h1 class="hero-title">Connexion</h1>
        </div>
    </div>

    <div class="container login-container">
        <div class="login-card">
            <h2 class="login-title">Se connecter</h2>
            
            {% with messages = get_flashed_messages(with_categories=true) %}

            {% endwith %}
            
<form method="POST" action="/login">
    <input type="hidden" name="csrf_token" value="{{ csrf_token() }}">
    
    <input type="hidden" name="next" value="{{ request.args.get('next', '') }}">
    
    <!-- reste du formulaire -->
    <div class="mb-3">
        <label for="email" class="form-label">Email</label>
        <input type="email" class="form-control" id="email" name="email" required>
    </div>
    
<div class="mb-3">
    <label for="password" class="form-label">Mot de passe</label>
    <div class="password-input-group">
        <input type="password" class="form-control" id="password" name="password" required>
        <button type="button" class="password-toggle" id="togglePassword" onclick="togglePasswordVisibility()">
            <i class="far fa-eye" id="toggleIcon"></i>
        </button>
    </div>
</div>
    <button type="submit" class="btn-login-form">Se connecter</button>
</form>
            
            
            
            
            <div class="register-link">
                Pas encore de compte ? <a href="/register">S'inscrire</a>
            </div>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Auto-fermeture des alertes après 5 secondes
        setTimeout(function() {
            document.querySelectorAll('.alert').forEach(function(alert) {
                let bsAlert = new bootstrap.Alert(alert);
                bsAlert.close();
            });
        }, 5000);
    </script>
    <script>
    function togglePasswordVisibility() {
        const passwordInput = document.getElementById('password');
        const toggleIcon = document.getElementById('toggleIcon');
        
        if (passwordInput.type === 'password') {
            passwordInput.type = 'text';
            toggleIcon.classList.remove('fa-eye');
            toggleIcon.classList.add('fa-eye-slash');
        } else {
            passwordInput.type = 'password';
            toggleIcon.classList.remove('fa-eye-slash');
            toggleIcon.classList.add('fa-eye');
        }
    }
</script>
</body>
</html>
