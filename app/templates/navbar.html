<nav class="navbar navbar-expand-lg">

    <div class="container">
        <!-- Logo / Nom du site -->
        <a class="navbar-brand" href="/">{{ site_name }}</a>
        
        <!-- Barre de recherche -->
        <div class="navbar-search">
            <form action="/" method="get" class="d-flex align-items-center w-100" autocomplete="off" id="navbar-search-form">
                <input type="text" 
                       name="q" 
                       id="navbar-search-input"  <!-- ID CHANGÉ pour éviter conflit -->
                    
                {% if query %}
                <button type="button" class="clear-search" onclick="window.clearNavbarSearch ? clearNavbarSearch() : window.location.href='/'">

                </button>
                {% endif %}
                <button type="submit" class="search-button">
                    <i class="fas fa-search"></i>
                </button>
            </form>
            <!-- Suggestions -->
            <div id="navbar-suggestions" class="suggestions-box"></div>  <!-- ID CHANGÉ -->
        </div>
        
        <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
            <span class="navbar-toggler-icon"></span>
        </button>
        
        <div class="collapse navbar-collapse" id="navbarNav">
            <ul class="navbar-nav ms-auto">
                <!-- Lien Statistiques -->
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/stats' %}active{% endif %}" href="/stats">Statistiques</a>
                </li>
                
                <!-- Lien À propos -->
                <li class="nav-item">
                    <a class="nav-link {% if request.path == '/about' %}active{% endif %}" href="/about">À propos</a>

                    <!-- Utilisateur connecté -->

                            {{ session.username }}
                        </a>
                        <ul class="dropdown-menu dropdown-menu-end" aria-labelledby="userDropdown">
                            <li><a class="dropdown-item" href="/profile">Mon profil</a></li>
                            <li><a class="dropdown-item" href="/favoris">Mes favoris</a></li>
                            <li><a class="dropdown-item" href="/mes-oeuvres">Mes œuvres notées</a></li>

                {% else %}

<script>
// ===== SUGGESTIONS - VERSION ISOLÉE =====
(function() {
    // Ne pas interférer avec le script principal
    const searchInput = document.getElementById('navbar-search-input');
    const suggestionsBox = document.getElementById('navbar-suggestions');
    
    if (!searchInput || !suggestionsBox) return;
    
    let navbarSuggestions = [];
    let selectedIndex = -1;
    
    searchInput.addEventListener('input', function(e) {
        const query = e.target.value;
        selectedIndex = -1;
        
        if (query.length < 2) {
            suggestionsBox.style.display = 'none';
            return;
        }
        
        fetch(`/api/suggestions?q=${encodeURIComponent(query)}`)
            .then(response => response.json())
            .then(data => {
                navbarSuggestions = data;
                if (data.length > 0) {
                    suggestionsBox.innerHTML = data.map((s, index) => 
                        `<div class="suggestion-item" data-index="${index}">
                            <strong>${s.texte}</strong> <small>${s.categorie}</small>
                        </div>`
                    ).join('');
                    
                    suggestionsBox.querySelectorAll('.suggestion-item').forEach(item => {
                        item.addEventListener('click', function() {
                            const index = this.dataset.index;
                            searchInput.value = navbarSuggestions[index].texte;
                            suggestionsBox.style.display = 'none';
                            document.getElementById('navbar-search-form').submit();
                        });
                    });
                    
                    suggestionsBox.style.display = 'block';
                } else {
                    suggestionsBox.style.display = 'none';
                }
            });
    });
    
    // Navigation clavier
    searchInput.addEventListener('keydown', function(e) {
        const items = suggestionsBox.querySelectorAll('.suggestion-item');
        
        if (items.length === 0) return;
        
        if (e.key === 'ArrowDown') {
            e.preventDefault();
            selectedIndex = Math.min(selectedIndex + 1, items.length - 1);
            updateSelected(items);
        } else if (e.key === 'ArrowUp') {
            e.preventDefault();
            selectedIndex = Math.max(selectedIndex - 1, -1);
            updateSelected(items);
        } else if (e.key === 'Enter' && selectedIndex >= 0) {
            e.preventDefault();
            searchInput.value = navbarSuggestions[selectedIndex].texte;
            suggestionsBox.style.display = 'none';
            document.getElementById('navbar-search-form').submit();
        }
    });
    
    function updateSelected(items) {
        items.forEach((item, index) => {
            if (index === selectedIndex) {
                item.classList.add('selected');
            } else {
                item.classList.remove('selected');
            }
        });
    }
    
    // Fermer les suggestions en cliquant ailleurs
    document.addEventListener('click', function(e) {
        if (!e.target.closest('#navbar-search-input') && !e.target.closest('#navbar-suggestions')) {
            suggestionsBox.style.display = 'none';
        }
    });
})();

// Fonction de clear pour la navbar
window.clearNavbarSearch = function() {
    const input = document.getElementById('navbar-search-input');
    if (input) {
        input.value = '';
        window.location.href = '/';
    }
};
</script>
