<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="csrf-token" content="{{ csrf_token() }}">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> {{ site_name }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Playfair+Display:wght@400;500;600;700&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>


        :root {
            --bg-dark: #0a0a0a;
            --bg-light: #f5f0e8;
            --surface-dark: #141414;
            --surface-light: #ffffff;
            --text-dark: #ffffff;
            --text-light: #2c3e50;
            --text-muted-dark: #7a7a7a;
            --text-muted-light: #5d6d7e;
            --border-dark: #2a2a2a;
            --border-light: #e0d6c8;
            --accent: #6c5ce7;
            --font-display: 'Space Grotesk', sans-serif;
            --font-text: 'Inter', sans-serif;
            --surface: var(--surface-dark);
            --border-color: var(--border-dark);
            --text-muted: var(--text-muted-dark);
        }

        body.theme-dark {
            --bg: var(--bg-dark);
            --surface: var(--surface-dark);
            --text: var(--text-dark);
            --text-muted: var(--text-muted-dark);
            --border: var(--border-dark);
            --card-shadow: 0 4px 24px rgba(0,0,0,0.4);
        }

        body.theme-light {
            --bg: var(--bg-light);
            --surface: var(--surface-light);
            --text: var(--text-light);
            --text-muted: var(--text-muted-light);
            --border: var(--border-light);
            --card-shadow: 0 4px 12px rgba(44,62,80,0.05);
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body {
            font-family: var(--font-text);
            background-color: var(--bg);
            color: var(--text);
            line-height: 1.6;
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            transition: background-color 0.3s ease, color 0.3s ease;
        }

        .main-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 2rem 1rem;
            min-height: calc(100vh - 150px);
        }

        .message-card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
            padding: 3rem 4rem;
            box-shadow: var(--card-shadow);
            text-align: center;
            max-width: 450px;
            width: 100%;
            position: relative;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to   { opacity: 1; transform: translateY(0); }
        }

        .message-text {
            font-family: 'Playfair Display', serif;
            font-size: 2.5rem;
            font-weight: 500;
            color: var(--text);
            letter-spacing: 1px;
            margin-bottom: 0.5rem;
            line-height: 1.2;
        }

        .heart {
            font-size: 2.5rem;
            margin: 1rem 0;
            animation: float 3s infinite ease-in-out;
            display: block;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50%       { transform: translateY(-6px); }
        }

        .date {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-style: italic;
            letter-spacing: 3px;
            margin-bottom: 1.5rem;
            text-transform: uppercase;
        }

        .back-link {
            display: inline-block;
            margin-top: 1rem;
            color: var(--text-muted);
            text-decoration: none;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 1px;
            padding: 0.6rem 1.5rem;
            border: 1px solid var(--border);
            border-radius: 30px;
            transition: all 0.2s;
        }

        .back-link:hover {
            border-color: var(--accent);
            color: var(--accent);
        }

        @media (max-width: 576px) {
            .message-card { padding: 2rem 1.5rem; }
            .message-text { font-size: 2rem; }
        }
    </style>
</head>
<body class="theme-dark">
    {% include 'navbar.html' %}

    <div class="main-content">
        <div class="message-card">
            <div class="message-text">Pour Kathy</div>
            <span class="heart">❤️</span>
            <div class="date">28.01.2003</div>
            <a href="javascript:history.back()" class="back-link">
                <i class="fas fa-arrow-left me-1"></i> Retour
            </a>
        </div>
    </div>

    {% include 'footer.html' %}

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        (function() {
            const saved = localStorage.getItem('theme') || 'dark';
            document.body.classList.remove('theme-dark', 'theme-light');
            document.body.classList.add('theme-' + saved);
        })();
    </script>
</body>
</html>
